  function getColor(score, max=50) {
    const percentage = (score / max) * 100;
    if (percentage >= 75) return '#4caf50';
    if (percentage >= 50) return '#ffeb3b';
    return '#f44336';
  }

  function showResult() {
    const seatNo = document.getElementById('seatNo').value.trim();
    const resultDiv = document.getElementById('result');

    if (students[seatNo]) {
      const student = students[seatNo];
      const subjects = [
        {name: "القرآن", score: student.quran},
        {name: "الإسلامية", score: student.islamic},
        {name: "اللغة العربية", score: student.arabic},
        {name: "الإنجليزي", score: student.english},
        {name: "الرياضيات", score: student.math},
        {name: "علوم", score: student.telom},
        {name: "الاجتماعيات", score: student.social}
      ];

      let subjectsHtml = '';
      subjects.forEach(sub => {
        subjectsHtml += `<div class="subject" style="background-color:${getColor(sub.score)};">
                          <span>${sub.name}</span> <span>${sub.score}</span>
                         </div>`;
      });

      const totalColor = getColor(student.total / subjects.length);

      resultDiv.innerHTML = `
        <div class="result-card">
          <h2>${student.name}</h2>
          ${subjectsHtml}
          <div class="total" style="background-color:${totalColor};">المجموع الكلي: ${student.total}</div>
        </div>
      `;
    } else {
      resultDiv.innerHTML = `<p class="error">رقم الجلوس غير موجود!</p>`;
    }
  }
