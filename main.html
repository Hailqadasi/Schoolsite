<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج الطلاب</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Tahoma, Arial, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
min-height:100vh;
padding:40px 20px;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
color:white;
margin-bottom:20px;
font-size:38px;
}

#timer{
color:#ffdddd;
font-size:18px;
margin-bottom:20px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

a{
display:block;
padding:18px;
background:linear-gradient(135deg,#00c6ff,#0072ff);
color:white;
text-decoration:none;
border-radius:15px;
font-size:20px;
font-weight:bold;
transition:0.3s;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

a:hover{
transform:translateY(-5px) scale(1.03);
background:linear-gradient(135deg,#ff512f,#dd2476);
}

footer{
margin-top:25px;
color:#ddd;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>📚 نتائج الطلاب</h1>

<div id="timer">الوقت المتبقي: 5:00</div>

<div class="grid">
<a href="grade1.html">الصف الأول</a>
<a href="grade2.html">الصف الثاني</a>
<a href="grade3.html">الصف الثالث</a>
<a href="grade4.html">الصف الرابع</a>
<a href="grade5.html">الصف الخامس</a>
<a href="grade6.html">الصف السادس</a>
<a href="grade7.html">الصف السابع</a>
<a href="grade8.html">الصف الثامن</a>
<a href="grade9.html">الصف التاسع</a>
<a href="grade10.html">الأول الثانوي</a>
<a href="grade11.html">الثاني الثانوي</a>
</div>

<footer>
جميع الحقوق محفوظة © 2026
</footer>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
// 🔗 الاتصال
const supabase = window.supabase.createClient(
  "https://eorcwponppumcppbmylt.supabase.co",
  "YOUR-ANON-KEY"
);

// 🔐 بيانات الجلسة
let card_id = localStorage.getItem("card_id");
let activated_at = localStorage.getItem("activated_at");

// ⛔ منع الدخول المباشر
if (!card_id || !activated_at) {
  window.location.href = "index.html";
}

// ⏳ العداد
function startTimer() {
  const timerEl = document.getElementById("timer");

  setInterval(() => {
    let now = new Date();
    let start = new Date(activated_at);
    let diff = 300 - Math.floor((now - start) / 1000);

    if (diff <= 0) {
      alert("⛔ انتهى وقت الكرت");
      localStorage.clear();
      window.location.href = "index.html";
      return;
    }

    let min = Math.floor(diff / 60);
    let sec = diff % 60;

    timerEl.innerText = `الوقت المتبقي: ${min}:${sec < 10 ? "0"+sec : sec}`;
  }, 1000);
}

// 🔍 تحقق من السيرفر
async function checkServer() {

  const { data, error } = await supabase
    .from("scards")
    .select("*")
    .eq("id", card_id)
    .single();

  if (error || !data) {
    alert("الكرت غير صالح");
    localStorage.clear();
    window.location.href = "index.html";
    return;
  }

  if (data.expired) {
    alert("⛔ الكرت منتهي");
    localStorage.clear();
    window.location.href = "index.html";
    return;
  }

  let now = new Date();
  let start = new Date(data.activated_at);
  let diff = (now - start) / 1000;

  if (diff > 300) {

    await supabase
      .from("scards")
      .update({ expired: true })
      .eq("id", card_id);

    alert("⛔ انتهت صلاحية الكرت");
    localStorage.clear();
    window.location.href = "index.html";
  }
}

// 🚀 تشغيل
checkServer();
startTimer();
</script>

</body>
</html>
