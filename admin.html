 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة تحكم المعلم</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: tahoma;
  background: #222;
  color: white;
  text-align: center;
}

.box {
  background: #333;
  padding: 20px;
  margin: 50px auto;
  width: 90%;
  max-width: 400px;
  border-radius: 15px;
}

button {
  display: block;
  width: 90%;
  margin: 10px auto;
  padding: 10px;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}

.delete { background: red; }
.stop { background: orange; }
.show { background: green; }
</style>
</head>

<body>

<div class="box">
  <h2>👨‍🏫 لوحة تحكم المعلم</h2>

  <button class="delete" onclick="deleteAll()">🗑️ حذف جميع النتائج</button>

  <button class="stop" onclick="toggleContest()">⛔ إيقاف / تشغيل المسابقة</button>

  <button class="show" onclick="toggleResults()">👁️ إظهار / إخفاء النتائج</button>
</div>

<script>
// 🔹 إعداد Firebase
var firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT"
};
firebase.initializeApp(firebaseConfig);

var db = firebase.database();

// 🔹 حذف كل النتائج
function deleteAll() {
  if (confirm("هل أنت متأكد؟")) {
    db.ref("students").remove();
    alert("تم حذف جميع النتائج");
  }
}

// 🔹 إيقاف / تشغيل المسابقة
function toggleContest() {
  var ref = db.ref("settings/contest");

  ref.once("value", function(snap) {
    var current = snap.val();

    if (current === "off") {
      ref.set("on");
      alert("تم تشغيل المسابقة");
    } else {
      ref.set("off");
      alert("تم إيقاف المسابقة");
    }
  });
}

// 🔹 إظهار / إخفاء النتائج
function toggleResults() {
  var ref = db.ref("settings/results");

  ref.once("value", function(snap) {
    var current = snap.val();

    if (current === "hide") {
      ref.set("show");
      alert("تم إظهار النتائج");
    } else {
      ref.set("hide");
      alert("تم إخفاء النتائج");
    }
  });
}
</script>

</body>
</html>
