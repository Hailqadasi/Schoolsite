<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم المعلم</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: tahoma;
  background: linear-gradient(to bottom, #fff, #ffe4ec);
  text-align: center;
}

.box {
  background: #ffffff;
  width: 95%;
  max-width: 350px;
  margin: 60px auto;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 0 10px rgba(255,105,180,0.3);
}

h2 {
  color: #d63384;
}

button {
  display: block;
  width: 100%;
  margin: 10px 0;
  padding: 12px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  color: white;
}

.delete { background: #ff4d6d; }
.stop { background: #ff85a2; }
.show { background: #d63384; }
</style>
</head>

<body>

<div class="box">
  <h2>👨‍🏫 لوحة التحكم</h2>

  <button class="delete" onclick="deleteAll()">حذف النتائج</button>
  <button class="stop" onclick="toggleContest()">إيقاف / تشغيل</button>
  <button class="show" onclick="toggleResults()">إظهار / إخفاء النتائج</button>
</div>

<script>
var firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT"
};
firebase.initializeApp(firebaseConfig);

var db = firebase.database();

function deleteAll() {
  if(confirm("تأكيد الحذف؟")){
    db.ref("students").remove();
    alert("تم الحذف");
  }
}

function toggleContest() {
  var ref = db.ref("settings/contest");
  ref.once("value", function(s){
    ref.set(s.val() === "off" ? "on" : "off");
  });
}

function toggleResults() {
  var ref = db.ref("settings/results");
  ref.once("value", function(s){
    ref.set(s.val() === "hide" ? "show" : "hide");
  });
}
</script>

</body>
</html>
