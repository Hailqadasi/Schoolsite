 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفعيل التطبيق</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { 
  font-family: Tahoma, Arial; 
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  margin: 0;
}
.card { 
  background: #fff; 
  max-width: 400px;
  width: 100%;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  text-align: center;
}
input, button {
  width: 100%;
  padding: 15px;
  font-size: 18px;
  margin-bottom: 15px;
  border-radius: 10px;
}
input { border: 2px solid #ddd; }
button {
  background: linear-gradient(to right, #4CAF50, #2E7D32);
  color: #fff;
  border: none;
  font-weight: bold;
}
#timer {
  margin-top: 20px;
  padding: 15px;
  background: #f8f9fa;
  border-radius: 10px;
  font-weight: bold;
}
.time-display {
  background:#4CAF50;
  color:#fff;
  padding:10px;
  border-radius:8px;
  font-size:20px;
}
</style>
</head>

<body>

<div class="card">
  <h3>تفعيل التطبيق</h3>
  <input type="text" id="cardCode" placeholder="أدخل رقم الكرت">
  <button onclick="activate()">تفعيل الآن</button>
  <div id="timer"></div>
</div>

<script>

/* Firebase */
firebase.initializeApp({
  apiKey: "APIKEY",
  authDomain: "AUTHDOMAIN",
  databaseURL: "https://appcards-c4730-default-rtdb.firebaseio.com",
  projectId: "PROJECTID",
  storageBucket: "STORAGE",
  messagingSenderId: "SENDERID",
  appId: "APPID"
});

var db = firebase.database();

/* الإعدادات */
const DAILY_LIMIT = 5 * 60 * 60;
const TOTAL_DAYS = 7;

/* Device ID */
function getDeviceId(){
  let id = localStorage.getItem("device_id");
  if(!id){
    id = "dev-" + Math.random().toString(36).substr(2,16);
    localStorage.setItem("device_id", id);
  }
  return id;
}

/* العداد */
var timerInterval = null;

function startUsageTimer(){

  let today = new Date().toDateString();
  let storedDay = localStorage.getItem("usage_day");
  let remaining = parseInt(localStorage.getItem("daily_remaining"));
  let usedDays = parseInt(localStorage.getItem("used_days")) || 0;
  let lastActive = parseInt(localStorage.getItem("last_active"));

  if(!storedDay){
    localStorage.setItem("usage_day", today);
    localStorage.setItem("daily_remaining", DAILY_LIMIT);
    localStorage.setItem("used_days", 1);
    remaining = DAILY_LIMIT;
    usedDays = 1;
  }

  if(storedDay !== today){
    usedDays++;
    if(usedDays > TOTAL_DAYS){
      endCard();
      return;
    }

    localStorage.setItem("usage_day", today);
    localStorage.setItem("daily_remaining", DAILY_LIMIT);
    localStorage.setItem("used_days", usedDays);
    remaining = DAILY_LIMIT;
  }

  if(lastActive){
    remaining -= Math.floor(Date.now()/1000) - lastActive;
  }

  if(remaining <= 0){
    showDailyEnd(usedDays);
    return;
  }

  localStorage.setItem("daily_remaining", remaining);
  localStorage.setItem("last_active", Math.floor(Date.now()/1000));

  timerInterval = setInterval(function(){

    remaining--;
    localStorage.setItem("daily_remaining", remaining);

    let h = Math.floor(remaining / 3600);
    let m = Math.floor((remaining % 3600) / 60);
    let s = remaining % 60;

    document.getElementById("timer").innerHTML = `
    ⏳ المتبقي اليوم
    <div class="time-display">${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}</div>
    <div style="margin-top:10px;font-size:13px">
    اليوم ${usedDays} من ${TOTAL_DAYS}
    </div>
    `;

    if(remaining <= 0){
      clearInterval(timerInterval);
      showDailyEnd(usedDays);
    }

  },1000);
}

function showDailyEnd(day){
  document.getElementById("timer").innerHTML = `
  ⏸ انتهت 5 ساعات اليوم<br>
  📅 اليوم ${day} من ${TOTAL_DAYS}
  `;
}

function endCard(){
  document.getElementById("timer").innerHTML = `
  انتهت صلاحية الكرت
  `;
}

/* التفعيل */

function activate(){

  let code = document.getElementById("cardCode").value.trim();

  if(!code){
    alert("أدخل رقم الكرت");
    return;
  }

  db.ref("cards/"+code).once("value").then(function(snap){

    if(!snap.exists()){
      alert("الكرت غير صحيح");
      return;
    }

    let data = snap.val();
    let device = getDeviceId();

    if(data.used && data.device !== device){
      alert("الكرت مستخدم على جهاز آخر");
      return;
    }

    if(!data.used){
      db.ref("cards/"+code).update({
        used:true,
        device:device
      });
    }

    startUsageTimer(); // تشغيل العداد

  });

}

</script>

</body>
</html>
