<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المسابقة</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: tahoma;
  background: linear-gradient(to bottom, #fff, #ffe4ec);
  text-align: center;
}

.box {
  background: white;
  width: 95%;
  max-width: 400px;
  margin: 40px auto;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 0 10px rgba(255,105,180,0.3);
}

h3 {
  color: #d63384;
}

button {
  width: 100%;
  margin: 8px 0;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #ff85a2;
  color: white;
  font-size: 15px;
}
</style>
</head>

<body>

<div class="box">
  <h3 id="q"></h3>

  <button onclick="answer(0)" id="a0"></button>
  <button onclick="answer(1)" id="a1"></button>
  <button onclick="answer(2)" id="a2"></button>
  <button onclick="answer(3)" id="a3"></button>
</div>

<script>
var firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT"
};
firebase.initializeApp(firebaseConfig);

// منع الدخول
firebase.database().ref("settings/contest").on("value", function(snap){
  if (snap.val() === "off") {
    alert("المسابقة متوقفة");
    window.location.href = "index.html";
  }
});

var studentName = localStorage.getItem("studentName");

var questions = [
  { q: "كم عدد الكواكب؟", a: ["7","8","9","10"], correct: 1 },
  { q: "عاصمة اليمن؟", a: ["عدن","صنعاء","تعز","حضرموت"], correct: 1 },
  { q: "2 + 2 = ؟", a: ["3","4","5","6"], correct: 1 }
];

var i = 0, score = 0;

function loadQuestion(){
  document.getElementById("q").innerText = questions[i].q;
  for (var j=0;j<4;j++){
    document.getElementById("a"+j).innerText = questions[i].a[j];
  }
}

function answer(x){
  if (x === questions[i].correct) score++;
  i++;
  if (i < questions.length) loadQuestion();
  else finish();
}

function finish(){
  firebase.database().ref("students").push({
    name: studentName,
    score: score
  });

  alert("درجتك: "+score);
  window.location.href = "leaderboard.html";
}

loadQuestion();
</script>

</body>
</html>
