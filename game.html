 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المسابقة</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: tahoma;
  background: #1e90ff;
  color: white;
  text-align: center;
}

.box {
  background: white;
  color: black;
  width: 90%;
  max-width: 500px;
  margin: 50px auto;
  padding: 20px;
  border-radius: 15px;
}

button {
  display: block;
  width: 90%;
  margin: 10px auto;
  padding: 10px;
  border: none;
  background: #0b3d91;
  color: white;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h3 id="q"></h3>

  <button onclick="answer(0)" id="a0"></button>
  <button onclick="answer(1)" id="a1"></button>
  <button onclick="answer(2)" id="a2"></button>
  <button onclick="answer(3)" id="a3"></button>
</div>

<script>
// 🔹 إعداد Firebase (ضع بياناتك)
var firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT"
};
firebase.initializeApp(firebaseConfig);

// 🔹 اسم الطالب
var studentName = localStorage.getItem("studentName");

// 🔹 الأسئلة
var questions = [
  {
    q: "كم عدد كواكب المجموعة الشمسية؟",
    a: ["7", "8", "9", "10"],
    correct: 1
  },
  {
    q: "عاصمة اليمن؟",
    a: ["عدن", "صنعاء", "تعز", "حضرموت"],
    correct: 1
  },
  {
    q: "كم 2 + 2 ؟",
    a: ["3", "4", "5", "6"],
    correct: 1
  }
];

var index = 0;
var score = 0;

// 🔹 عرض السؤال
function loadQuestion() {
  document.getElementById("q").innerText = questions[index].q;

  for (var i = 0; i < 4; i++) {
    document.getElementById("a"+i).innerText = questions[index].a[i];
  }
}

// 🔹 عند الإجابة
function answer(i) {
  if (i === questions[index].correct) {
    score++;
  }

  index++;

  if (index < questions.length) {
    loadQuestion();
  } else {
    finish();
  }
}

// 🔹 إنهاء المسابقة
function finish() {
  var ref = firebase.database().ref("students");

  ref.push({
    name: studentName,
    score: score
  });

  alert("انتهت المسابقة! درجتك: " + score);

  window.location.href = "leaderboard.html";
}

// 🔹 تشغيل أول سؤال
loadQuestion();
</script>

</body>
</html>
