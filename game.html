button.option{

    padding: 14px;

}

button.option:hover{
    transform: scale(1.03);
    background: linear-gradient(145deg,#e0e0e0,#c9c9c9);
}

button.option.correct{
    background: #28a745;
    color: white;
}

button.option.wrong{
    background: #dc3545;
    color: white;
}

button.lifeline{
    width: auto;
    display: inline-block;

    padding: 10px 16px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: linear-gradient(145deg,#ffa500,#ffbf40);

}

button.lifeline.used{
    background: gray !important;
    pointer-events: none;
    color: #eee;
}

#score{

    font-size: 22px;

hr{

// تحويل allQuestions إلى الصيغة التي تستخدمها الدوال (q, a, correct)
let questions = allQuestions.map(q => ({
    q: q.question,
    a: q.options,
    correct: q.options.indexOf(q.answer)  // إيجاد رقم الخيار الصحيح
}));

let current = 0;
let score = 0;

function loadQuestion(){

    if(current >= questions.length){
        endGame();
        return;
    }

    document.getElementById("question").innerText = questions[current].q;

    let answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    questions[current].a.forEach((answer, index)=>{

        let btn = document.createElement("button");
        btn.innerText = answer;
        btn.className = "option";
        btn.onclick = ()=>checkAnswer(index, btn);
        answersDiv.appendChild(btn);

    });
}

function checkAnswer(index, button){

    let correctIndex = questions[current].correct;
    let buttons = document.querySelectorAll(".option");

    buttons.forEach(btn => btn.disabled = true);

    if(index === correctIndex){
        button.classList.add("correct");
        score += 10;
    } else {
        button.classList.add("wrong");
        buttons[correctIndex].classList.add("correct");
    }

    document.getElementById("score").innerText = "النقاط: " + score;

    setTimeout(()=>{
        current++;
        loadQuestion();
    }, 1500);
}

function endGame(){
    localStorage.setItem("finalScore", score);
    window.location.href = "result.html";
}

/* 50:50 */
document.getElementById("fifty").onclick = function(){

    let correctIndex = questions[current].correct;
    let buttons = document.querySelectorAll(".option");

    let removed = 0;

    buttons.forEach((btn, index)=>{
        if(index !== correctIndex && removed < 2){
            btn.style.display = "none";
            removed++;
        }
    });

    this.classList.add("used");
};

/* سؤال الجمهور */
document.getElementById("audience").onclick = function(){

    let correctIndex = questions[current].correct;
    let percent = Math.floor(Math.random() * 30) + 50;

    alert(
        "نتيجة الجمهور:\n\n" +
        questions[current].a[correctIndex] + " : " + percent + "%\n" +
        "بقية الخيارات موزعة عشوائياً"
    );

    this.classList.add("used");
};

/* تبديل السؤال */
document.getElementById("change").onclick = function(){

    current++;
    loadQuestion();
    this.classList.add("used");
};

    }
}
