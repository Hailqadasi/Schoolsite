                    <tr>
                        <th>المادة</th>
                        <th>الدرجة</th>
                        <th>حالة النجاح</th>
                    </tr>`;
            
            const subjects = ['quran','islam','arabic','english','math','science','social'];
            const names = ['القرآن','التربية الإسلامية','اللغة العربية','اللغة الإنجليزية','الرياضيات','العلوم','الاجتماعيات'];
            
            for (let i = 0; i < subjects.length; i++) {
                const score = student[subjects[i]];
                const status = score >= passMark ? 'ناجح' : 'راسب';
                const cls = score >= passMark ? 'pass' : 'fail';
                table += `<tr class="${cls}"><td>${names[i]}</td><td>${score}</td><td>${status}</td></tr>`;
            }
            
            table += `</table><div class="total">المجموع الكلي: ${student.total}</div>`;
            resultDiv.innerHTML = `<h2>${student.name} - رقم الجلوس: ${student.seat}</h2>${table}`;
        }
    </script>
</body>
</html>
