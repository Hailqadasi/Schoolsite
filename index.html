<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فحص الكرت</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<input id="cardCode" placeholder="أدخل الكرت">
<button onclick="activate()">تحقق</button>

<div id="msg"></div>

<script>
const msg = document.getElementById("msg");

function show(t){
  msg.innerText = t;
}

show("✅ الصفحة تعمل");

const supabaseUrl = "https://ujewyoendqnhkztnjsmf.supabase.co";
const supabaseKey = "sb_publishable_7FOTfN_SkbuQGzO7gyhJEQ_vRxoLDSF";

let supabase;

try{
  supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
  show("✅ تم الاتصال بالمكتبة");
}catch(e){
  show("❌ فشل تحميل المكتبة: " + e.message);
}

async function activate(){
  try{
    let code = document.getElementById("cardCode").value.trim().toUpperCase();

    if(!code){
      show("اكتب الكرت أولاً");
      return;
    }

    show("⏳ جاري البحث...");

    const { data, error } = await supabase
      .from("cards")
      .select("*")
      .eq("code", code)
      .single();

    if(error){
      show("❌ خطأ: " + error.message);
      return;
    }

    show("✅ تم العثور على الكرت: " + data.code);

  }catch(err){
    show("❌ مشكلة: " + err.message);
  }
}
</script>

</body>
</html>  border-radius: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="box">
  <h2>🎓 تسجيل الطالب</h2>

  <input type="text" id="name" placeholder="أدخل الاسم الرباعي">

  <br>

  <button onclick="start()">ابدأ المسابقة</button>
</div>

<script>
function start() {
  var name = document.getElementById("name").value.trim();

  // تحقق من الاسم الرباعي
  if (name.split(" ").length < 4) {
    alert("يجب إدخال الاسم الرباعي");
    return;
  }

  // حفظ الاسم
  localStorage.setItem("studentName", name);

  // الانتقال لصفحة اللعبة
  window.location.href = "game.html";
}
</script>

</body>
</html>
