 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>فحص الكرت</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:#fff;
padding:30px;
width:320px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
text-align:center;
}
input,button{
width:100%;
padding:12px;
font-size:18px;
margin-bottom:15px;
box-sizing:border-box;
}
button{
border:none;
background:#0d6efd;
color:#fff;
cursor:pointer;
}
#result{
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>إدخال الكرت</h2>

<input id="code" placeholder="رقم الكرت">

<button onclick="checkCard()">تحقق</button>

<div id="result">جاهز</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const result = document.getElementById("result");

function msg(t){
  result.innerText = t;
}

async function checkCard(){

  if(!window.supabase){
    msg("مكتبة Supabase لم تعمل");
    return;
  }

  const supabase = window.supabase.createClient(
    "https://eorcwponppumcppbmylt.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvcmN3cG9ucHB1bWNwcGJteWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDYzMzgsImV4cCI6MjA5MjAyMjMzOH0.TWIDhL_WONrQ1YyxBTFW3Xw4QJn_DlaKwHsrmyEuq98"
  );

  let code = document.getElementById("code").value.trim();

  if(!code){
    msg("أدخل رقم الكرت");
    return;
  }

  msg("جاري التحقق...");

  try{

    const { data, error } = await supabase
      .from("scards")
      .select("*")
      .eq("code", parseInt(code))
      .single();

    if (error && error.code !== "PGRST116") {
      msg("خطأ: " + error.message);
      return;
    }

    if (data) {
      msg("✅ الكرت موجود");

      // 🔥 فتح الصفحة الرئيسية
      setTimeout(() => {
        window.location.href = "main.html";
      }, 800);

    } else {
      msg("❌ الكرت غير موجود");
    }

  }catch(e){
    msg("فشل الاتصال");
    console.log(e);
  }

}
</script>

</body>
</html>
