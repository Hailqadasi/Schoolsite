<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📸 معرض الصور - سحابي</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <style>
        /* ===== جميع التنسيقات السابقة ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        /* ===== نافذة تسجيل الدخول ===== */
        .login-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.5s ease;
        }
        .login-overlay.active {
            display: flex;
        }

        .login-box {
            background: #fff;
            border-radius: 20px;
            padding: 40px 35px;
            max-width: 420px;
            width: 90%;
            text-align: center;
            animation: zoomIn 0.4s ease;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
        }

        .login-box .login-icon {
            font-size: 64px;
            color: #1877f2;
            margin-bottom: 16px;
        }

        .login-box h2 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .login-box p {
            font-size: 14px;
            color: #65676b;
            margin-bottom: 24px;
        }

        .login-box .login-input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            text-align: right;
        }

        .login-box .login-input-group label {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .login-box .login-input-group input {
            padding: 14px 18px;
            border: 2px solid #e4e6eb;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
            background: #f0f2f5;
        }

        .login-box .login-input-group input:focus {
            border-color: #1877f2;
            background: #fff;
        }

        .login-box .login-input-group input::placeholder {
            color: #8a8f94;
        }

        .login-box .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #1877f2;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 16px;
        }

        .login-box .login-btn:hover {
            background: #166fe5;
            transform: scale(1.02);
        }

        .login-box .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-box .login-error {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .login-box .login-error.show {
            display: block;
        }

        /* ===== باقي التنسيقات ===== */
        .page-header {
            background: #fff;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .page-header h1 {
            font-size: 22px;
            color: #1a1a1a;
        }
        .page-header h1 i {
            color: #1877f2;
        }

        .page-header .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .page-header .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #65676b;
            cursor: pointer;
            transition: opacity 0.2s;
            padding: 4px 12px 4px 8px;
            border-radius: 30px;
            background: #f0f2f5;
        }
        .page-header .user-info:hover {
            background: #e4e6eb;
        }
        .page-header .user-info .user-name-display {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 14px;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .page-header .user-info .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            flex-shrink: 0;
        }

        .back-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: #e4e6eb;
            color: #65676b;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            display: none;
        }
        .back-btn:hover {
            background: #ccd0d5;
        }
        .back-btn.visible {
            display: inline-block;
        }

        /* ===== شريط البحث ===== */
        .search-bar {
            background: #fff;
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #e4e6eb;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            background: #f0f2f5;
            transition: all 0.3s;
            min-width: 120px;
        }
        .search-bar input:focus {
            border-color: #1877f2;
            background: #fff;
        }
        .search-bar input::placeholder {
            color: #65676b;
        }
        .search-bar button {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: #1877f2;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .search-bar button:hover {
            background: #166fe5;
            transform: scale(1.02);
        }
        .search-bar .clear-btn {
            background: #e4e6eb;
            color: #65676b;
        }
        .search-bar .clear-btn:hover {
            background: #ccd0d5;
        }

        /* ===== قسم إضافة منشور ===== */
        .upload-section {
            background: #fff;
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        .upload-section .upload-header {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .upload-section .upload-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            flex-shrink: 0;
            font-size: 18px;
        }

        .upload-section .upload-textarea {
            flex: 1;
            min-height: 60px;
            padding: 10px 14px;
            border: 1px solid #e4e6eb;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            resize: vertical;
            background: #f0f2f5;
            transition: all 0.3s;
            font-family: inherit;
        }
        .upload-section .upload-textarea:focus {
            border-color: #1877f2;
            background: #fff;
        }
        .upload-section .upload-textarea::placeholder {
            color: #65676b;
        }

        .upload-section .upload-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid #f0f2f5;
        }

        .upload-section .upload-tools .tools-left {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .upload-section .upload-tools .tools-left button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: #f0f2f5;
            color: #65676b;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .upload-section .upload-tools .tools-left button:hover {
            background: #e4e6eb;
        }
        .upload-section .upload-tools .tools-left button i {
            font-size: 16px;
        }
        .upload-section .upload-tools .tools-left .image-btn {
            color: #45b7d1;
        }
        .upload-section .upload-tools .tools-left .image-btn:hover {
            background: #e3f2fd;
        }
        .upload-section .upload-tools .tools-left .image-btn.has-image {
            background: #45b7d1;
            color: #fff;
        }
        .upload-section .upload-tools .tools-left .image-btn.has-image:hover {
            background: #3a9bb5;
        }

        .upload-section .upload-tools .publish-btn {
            padding: 8px 28px;
            border: none;
            border-radius: 20px;
            background: #1877f2;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .upload-section .upload-tools .publish-btn:hover {
            background: #166fe5;
            transform: scale(1.02);
        }
        .upload-section .upload-tools .publish-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .upload-section .image-preview-container {
            display: none;
            margin-top: 12px;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #f0f2f5;
        }
        .upload-section .image-preview-container.visible {
            display: block;
        }
        .upload-section .image-preview-container img {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            background: #fff;
        }
        .upload-section .image-preview-container .remove-image {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .upload-section .image-preview-container .remove-image:hover {
            background: rgba(255, 0, 0, 0.7);
        }

        .progress-bar {
            display: none;
            width: 100%;
            height: 3px;
            background: #e4e6eb;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-bar.active {
            display: block;
        }
        .progress-bar .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1877f2, #4facfe);
            border-radius: 4px;
            transition: width 0.3s;
            width: 0%;
        }

        /* ===== الملف الشخصي ===== */
        .profile-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            text-align: center;
            display: none;
            animation: fadeInUp 0.4s ease;
        }
        .profile-card.visible {
            display: block;
        }

        .profile-card .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            margin: 0 auto 12px;
        }

        .profile-card .profile-name {
            font-size: 22px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .profile-card .profile-id {
            font-size: 13px;
            color: #65676b;
            margin-bottom: 16px;
        }

        .profile-card .profile-stats {
            display: flex;
            justify-content: space-around;
            padding: 16px 0;
            border-top: 1px solid #f0f2f5;
            border-bottom: 1px solid #f0f2f5;
            margin-bottom: 16px;
        }

        .profile-card .profile-stats .stat {
            text-align: center;
        }

        .profile-card .profile-stats .stat .stat-number {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
        }

        .profile-card .profile-stats .stat .stat-label {
            font-size: 12px;
            color: #65676b;
        }

        .profile-card .profile-bio {
            font-size: 14px;
            color: #65676b;
            padding: 8px 0;
        }

        .profile-card .profile-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 12px;
        }

        .profile-card .profile-actions button {
            padding: 8px 24px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .profile-card .profile-actions .view-posts-btn {
            background: #1877f2;
            color: #fff;
        }
        .profile-card .profile-actions .view-posts-btn:hover {
            background: #166fe5;
            transform: scale(1.02);
        }
        .profile-card .profile-actions .close-profile-btn {
            background: #e4e6eb;
            color: #65676b;
        }
        .profile-card .profile-actions .close-profile-btn:hover {
            background: #ccd0d5;
        }

        /* ===== بطاقة المنشور ===== */
        .post-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-bottom: 20px;
            animation: fadeInUp 0.4s ease;
            transition: all 0.3s ease;
        }
        .post-card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        /* ===== رأس المنشور ===== */
        .post-header {
            padding: 12px 16px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f2f5;
        }
        .post-user {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .post-user:hover {
            opacity: 0.8;
        }
        .post-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .post-user-info {
            display: flex;
            flex-direction: column;
        }
        .post-username {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a1a;
        }
        .post-time {
            font-size: 12px;
            color: #65676b;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .post-time i {
            font-size: 10px;
        }

        .post-actions-btns {
            display: flex;
            gap: 4px;
        }
        .post-actions-btns button {
            background: none;
            border: none;
            color: #65676b;
            cursor: pointer;
            padding: 6px 8px;
            border-radius: 50%;
            transition: all 0.2s;
            font-size: 15px;
        }
        .post-actions-btns button:hover {
            background: #f0f2f5;
        }
        .post-actions-btns .delete-btn:hover {
            background: #fee;
            color: #ff4d4d;
        }

        /* ===== محتوى المنشور ===== */
        .post-content {
            padding: 12px 16px 8px;
        }

        .post-text {
            font-size: 15px;
            color: #1a1a1a;
            line-height: 1.7;
            word-wrap: break-word;
            white-space: pre-wrap;
            min-height: 20px;
        }

        /* ===== صورة المنشور ===== */
        .post-image-wrapper {
            background: #f0f2f5;
            display: none;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
            position: relative;
            margin: 0 0 8px;
        }
        .post-image-wrapper.visible {
            display: flex;
        }
        .post-image-wrapper img {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: contain;
            display: block;
            background: #fff;
            transition: transform 0.3s;
        }
        .post-image-wrapper img:hover {
            transform: scale(1.01);
        }
        .post-image-wrapper .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .post-image-wrapper:hover .image-overlay {
            opacity: 1;
        }
        .post-image-wrapper .image-overlay i {
            color: #fff;
            font-size: 48px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        /* ===== أزرار التفاعل ===== */
        .post-actions {
            display: flex;
            justify-content: space-around;
            padding: 6px 16px;
            border-top: 1px solid #f0f2f5;
            border-bottom: 1px solid #f0f2f5;
        }
        .post-actions button {
            flex: 1;
            padding: 8px 6px;
            border: none;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #65676b;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .post-actions button:hover {
            background: #f0f2f5;
        }
        .post-actions button:active {
            transform: scale(0.95);
        }
        .post-actions button.liked {
            color: #1877f2;
        }
        .post-actions button.liked i {
            font-weight: 900;
        }
        .post-actions button i {
            font-size: 16px;
        }

        /* ===== قسم التعليقات ===== */
        .comments-section {
            padding: 10px 16px 14px;
            background: #fafafa;
            border-top: 1px solid #f0f2f5;
            display: none;
        }
        .comments-section.visible {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .comments-header h4 {
            font-size: 13px;
            color: #65676b;
            font-weight: 500;
        }
        .comments-header .comment-count {
            background: #e4e6eb;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #65676b;
        }

        .comments-list {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .comments-list::-webkit-scrollbar {
            width: 4px;
        }
        .comments-list::-webkit-scrollbar-track {
            background: #f0f2f5;
            border-radius: 10px;
        }
        .comments-list::-webkit-scrollbar-thumb {
            background: #ccd0d5;
            border-radius: 10px;
        }

        .comment-item {
            display: flex;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #f0f2f5;
            animation: fadeIn 0.3s ease;
            align-items: flex-start;
        }
        .comment-item:last-child {
            border-bottom: none;
        }
        .comment-item .comment-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .comment-item .comment-body {
            flex: 1;
        }
        .comment-item .comment-user {
            font-weight: 600;
            font-size: 12px;
            color: #1a1a1a;
        }
        .comment-item .comment-text {
            font-size: 13px;
            color: #1a1a1a;
            word-wrap: break-word;
            margin-top: 1px;
        }
        .comment-item .comment-time {
            font-size: 10px;
            color: #65676b;
            margin-top: 2px;
        }
        .comment-item .comment-delete-btn {
            background: none;
            border: none;
            color: #ccd0d5;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 50%;
            font-size: 12px;
            transition: all 0.2s;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .comment-item .comment-delete-btn:hover {
            color: #ff4d4d;
            background: #fee;
        }

        .no-comments {
            text-align: center;
            color: #65676b;
            font-size: 13px;
            padding: 15px 0;
        }
        .no-comments i {
            display: block;
            font-size: 28px;
            margin-bottom: 6px;
            opacity: 0.3;
        }

        /* ===== إضافة تعليق ===== */
        .add-comment {
            display: flex;
            gap: 8px;
            align-items: center;
            padding-top: 8px;
            border-top: 1px solid #f0f2f5;
        }
        .add-comment .comment-input-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .add-comment input {
            flex: 1;
            padding: 8px 14px;
            border: 1px solid #e4e6eb;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.3s;
            background: #f0f2f5;
        }
        .add-comment input:focus {
            border-color: #1877f2;
            background: #fff;
        }
        .add-comment input::placeholder {
            color: #65676b;
        }

    <!-- ===== رسالة إشعار ===== -->
    <div id="toast"></div>

    <script>
        // ============================================================
        // ===== مفتاح ImgBB =====
        // ============================================================
        const IMGBB_API_KEY = '1325c7cdc0aaa248f2175858733c3231';

        // ============================================================
        // ===== نظام تسجيل الدخول =====
        // ============================================================

        let currentUserName = '';
        let currentUserId = '';
        let isAdmin = false;
        let allPosts = [];
        let filteredPosts = [];
        let confirmCallback = null;
        let db = null;
        let viewingUserId = null;
        let isProfileView = false;
        let tempImageData = null;

        // ===== دالة تسجيل الدخول =====
        function loginUser(name) {
            name = name.trim();
            if (!name || name.length < 2) {
                document.getElementById('loginError').classList.add('show');
                return false;
            }

            currentUserName = name;
            currentUserId = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);

            localStorage.setItem('userName', currentUserName);
            localStorage.setItem('userId', currentUserId);

            document.getElementById('loginOverlay').classList.remove('active');
            updateUserInterface();

            showToast(`👋 مرحباً ${currentUserName}!`, 2500);
            return true;
        }

        // ===== تحديث واجهة المستخدم =====
        function updateUserInterface() {
            const displayName = currentUserName || 'مستخدم';
            const letter = displayName.charAt(0).toUpperCase();

            document.getElementById('userNameDisplay').textContent = displayName;
            document.getElementById('avatarLetter').textContent = letter;
            document.getElementById('uploadAvatar').textContent = letter;

            const avatarColor = getAvatarColor(currentUserId);
            document.querySelectorAll('.avatar, .upload-avatar').forEach(el => {
                if (el.classList.contains('comment-input-avatar')) return;
                el.style.background = avatarColor;
            });
        }

        // ===== التحقق من تسجيل الدخول =====
        function checkLogin() {
            const savedName = localStorage.getItem('userName');
            const savedId = localStorage.getItem('userId');

            if (savedName && savedId) {
                currentUserName = savedName;
                currentUserId = savedId;
                document.getElementById('loginOverlay').classList.remove('active');
                updateUserInterface();
                return true;
            } else {
                document.getElementById('loginOverlay').classList.add('active');
                document.getElementById('loginNameInput').focus();
                return false;
            }
        }

        // ===== تغيير الاسم =====
        document.getElementById('userInfo').addEventListener('click', () => {
            const newName = prompt('✏️ أدخل اسمك الجديد:', currentUserName);
            if (newName && newName.trim() && newName.trim().length >= 2) {
                currentUserName = newName.trim();
                localStorage.setItem('userName', currentUserName);
                updateUserInterface();
                showToast(`✅ تم تغيير الاسم إلى ${currentUserName}`, 2000);
            } else if (newName !== null) {
                showToast('⚠️ الاسم يجب أن يحتوي على حرفين على الأقل', 2000);
            }
        });

        // ===== أحداث نافذة تسجيل الدخول =====
        document.getElementById('loginBtn').addEventListener('click', () => {
            const name = document.getElementById('loginNameInput').value;
            loginUser(name);
        });

        document.getElementById('loginNameInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const name = document.getElementById('loginNameInput').value;
                loginUser(name);
            }
            document.getElementById('loginError').classList.remove('show');
        });

        // ============================================================
        // ===== رفع الصور إلى السحابة (ImgBB) مع تحسينات =====
        // ============================================================

        async function uploadToImgBB(imageDataUrl) {
            try {
                // 1. تحويل base64 إلى Blob
                const response = await fetch(imageDataUrl);
                const blob = await response.blob();

                // 2. التحقق من حجم الصورة (حد أقصى 32MB)
                if (blob.size > 32 * 1024 * 1024) {
                    throw new Error('حجم الصورة كبير جداً (الحد الأقصى 32MB)');
                }

                // 3. إنشاء FormData
                const formData = new FormData();
                formData.append('image', blob, 'image.jpg');
                formData.append('key', IMGBB_API_KEY);
                formData.append('name', 'post_' + Date.now());
                formData.append('expiration', '0'); // لا تنتهي صلاحيتها

                // 4. إرسال الطلب
                const uploadResponse = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });

                // 5. قراءة النتيجة
                const result = await uploadResponse.json();

                if (result.success) {
                    console.log('✅ تم رفع الصورة للسحابة:', result.data.url);
                    return result.data.url;
                } else {
                    // عرض تفاصيل الخطأ
                    const errorMsg = result.error?.message || 'فشل رفع الصورة';
                    console.error('❌ فشل رفع الصورة:', errorMsg);
                    throw new Error(errorMsg);
                }
            } catch (error) {
                console.error('❌ خطأ في رفع الصورة:', error.message);
                // في حالة الفشل، نستخدم الصورة محلياً (base64)
                showToast('⚠️ فشل الرفع للسحابة، تم الحفظ محلياً', 3000);
                return imageDataUrl;
            }
        }

        // ============================================================
        // ===== اختبار اتصال ImgBB =====
        // ============================================================

        async function testImgBBConnection() {
            try {
                // إنشاء صورة اختبارية صغيرة
                const canvas = document.createElement('canvas');
                canvas.width = 10;
                canvas.height = 10;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#1877f2';
                ctx.fillRect(0, 0, 10, 10);
                const testImage = canvas.toDataURL('image/jpeg', 0.5);

                const formData = new FormData();
                const response = await fetch(testImage);
                const blob = await response.blob();
                formData.append('image', blob, 'test.jpg');
                formData.append('key', IMGBB_API_KEY);

                const uploadResponse = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await uploadResponse.json();

                if (result.success) {
                    console.log('✅ اتصال ImgBB ناجح! المفتاح صحيح.');
                    return true;
                } else {
                    console.error('❌ فشل اختبار اتصال ImgBB:', result.error?.message);
                    return false;
                }
            } catch (error) {
                console.error('❌ خطأ في اختبار اتصال ImgBB:', error.message);
                return false;
            }
        }

        // ============================================================
        // ===== IndexedDB =====
        // ============================================================

        const DB_NAME = 'GalleryDB_V7';
        const DB_VERSION = 1;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open(DB_NAME, DB_VERSION);

                request.onupgradeneeded = (event) => {
                    const db = event.target.result;
                    if (!db.objectStoreNames.contains('posts')) {
                        const store = db.createObjectStore('posts', { keyPath: 'id' });
                        store.createIndex('userId', 'userId', { unique: false });
                        store.createIndex('timestamp', 'timestamp', { unique: false });
                        console.log('✅ تم إنشاء قاعدة البيانات');
                    }
                };

                request.onsuccess = (event) => {
                    db = event.target.result;
                    console.log('✅ تم فتح قاعدة البيانات');
                    resolve(db);
                };

                request.onerror = (event) => {
                    console.error('❌ خطأ في فتح قاعدة البيانات:', event.target.error);
                    reject(event.target.error);
                };
            });
        }

        function savePostToDB(post) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['posts'], 'readwrite');
                const store = transaction.objectStore('posts');
                const request = store.put(post);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        function deletePostFromDB(id) {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['posts'], 'readwrite');
                const store = transaction.objectStore('posts');
                const request = store.delete(id);
                request.onsuccess = () => resolve();
                request.onerror = () => reject(request.error);
            });
        }

        function getAllPostsFromDB() {
            return new Promise((resolve, reject) => {
                const transaction = db.transaction(['posts'], 'readonly');
                const store = transaction.objectStore('posts');
                const request = store.getAll();
                request.onsuccess = () => {
                    const posts = request.result || [];
                    posts.sort((a, b) => b.timestamp - a.timestamp);
                    resolve(posts);
                };
                request.onerror = () => reject(request.error);
            });
        }

        // ============================================================
        // ===== ضغط الصور =====
        // ============================================================

        function compressImage(file, maxWidth = 1200, maxHeight = 1200, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let width = img.width;
                        let height = img.height;

                        if (width > maxWidth) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        }
                        if (height > maxHeight) {
                            width = (width * maxHeight) / height;
                            height = maxHeight;
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, 0, 0, width, height);

                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        function getAvatarColor(userId) {
            const colors = ['#4facfe', '#a18cd1', '#fbc2eb', '#f6d365', '#ff6b6b', '#4ecdc4', '#45b7d1', '#96c93d', '#f39c12',
                '#e74c3c'
            ];
            let hash = 0;
            for (let i = 0; i < userId.length; i++) {
                hash = userId.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        function getPostTime(timestamp) {
            const now = Date.now();
            const diff = Math.floor((now - timestamp) / 1000);
            if (diff < 60) return 'الآن';
            if (diff < 3600) return Math.floor(diff / 60) + ' دقيقة';
            if (diff < 86400) return Math.floor(diff / 3600) + ' ساعة';
            if (diff < 604800) return Math.floor(diff / 86400) + ' يوم';
            return new Date(timestamp).toLocaleDateString('ar-EG');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function toggleLike(postId) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            const index = post.likedBy.indexOf(currentUserId);
            if (index === -1) {
                post.likedBy.push(currentUserId);
                post.likes++;
            } else {
                post.likedBy.splice(index, 1);
                post.likes--;
            }

            try {
                await savePostToDB(post);
                await loadPosts();
                if (isProfileView && viewingUserId) {
                    openProfile(viewingUserId);
                }
            } catch (error) {
                console.error('❌ خطأ في تحديث الإعجاب:', error);
                showToast('⚠️ حدث خطأ', 2000);
            }
        }

        async function addComment(postId, text) {
            if (!text || text.trim() === '') return;

            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            post.comments.push({
                id: Date.now(),
                userId: currentUserId,
                userName: currentUserName,
                text: text.trim(),
                timestamp: Date.now()
            });

            try {
                await savePostToDB(post);
                await loadPosts();

                const timeAgo = getPostTime(post.timestamp);

                const textHTML = hasText ?

        // ============================================================

        document.getElementById('postTextInput').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                publishPost();
            }
        });

        // ============================================================
        // ===== تهيئة التطبيق =====
        // ============================================================

        async function initApp() {
            const isLoggedIn = checkLogin();

            if (!isLoggedIn) {
                return;
            }

            try {
                await openDB();
                await loadPosts();

                // اختبار اتصال ImgBB
                const isConnected = await testImgBBConnection();
                if (!isConnected) {
                    showToast('⚠️ مشكلة في الاتصال بالسحابة، سيتم الحفظ محلياً', 4000);
                    console.warn('⚠️ فشل اختبار اتصال ImgBB');
                } else {
                    console.log('✅ اتصال ImgBB ناجح');
                }

                setTimeout(() => {
                    const count = allPosts.length;
                    if (count === 0) {
                        showToast(`👋 مرحباً ${currentUserName}! انشر أول منشور لك`, 2500);
                    } else {
                        showToast(`👋 مرحباً ${currentUserName}! لديك ${count} منشور`, 2000);
                    }
                }, 500);

            } catch (error) {
                console.error('❌ خطأ في تهيئة التطبيق:', error);
                showToast('⚠️ حدث خطأ في تهيئة التطبيق', 3000);
            }
        }

        // بدء التطبيق
        initApp();
    </script>
</body>
</html>
