 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>فحص الكرت</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:#fff;
padding:30px;
width:320px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
text-align:center;
}
input,button{
width:100%;
padding:12px;
font-size:18px;
margin-bottom:15px;
box-sizing:border-box;
}
button{
border:none;
background:#0d6efd;
color:#fff;
cursor:pointer;
}
#result{
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>إدخال الكرت</h2>

<input id="code" placeholder="رقم الكرت">

<button onclick="checkCard()">تحقق</button>

<div id="result">جاهز</div>
</div>

<!-- ضع المكتبة آخر الصفحة -->
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const result = document.getElementById("result");

function msg(t){
result.innerText = t;
}

async function checkCard(){

msg("تم الضغط");

if(!window.supabase){
msg("مكتبة Supabase لم تحمل");
return;
}

const supabase = window.supabase.createClient(
"https://xoofgkdaedktsneahdhd.supabase.co",
"sb_publishable__auzC8_Ywsaj4Zx-coLkRg_DVD7vcpo"
);

const code = document.getElementById("code").value.trim();

if(!code){
msg("أدخل رقم الكرت");
return;
}

msg("جاري الاتصال...");

try{

const {data,error} = await supabase
.from("cards")
.select("*")
.eq("code", parseInt(code));

if(error){
msg("خطأ: " + error.message);
return;
}

if(data.length > 0){
msg("✅ الكرت موجود");
}else{
msg("❌ غير موجود");
}

}catch(e){
msg("فشل الاتصال");
console.log(e);
}

}
</script>

</body>
</html>
