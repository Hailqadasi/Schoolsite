 <!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الموسوعة التعليمية الذكية</title>

<style>
body{
    margin:0;
    font-family:Tahoma,Arial;
    background:linear-gradient(135deg,#0f172a,#2563eb);
    color:#fff;
}

header{
    padding:20px;
    text-align:center;
}

#clock{
    font-size:18px;
    margin-top:8px;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.card{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(8px);
    border-radius:18px;
    padding:24px;
    margin:18px 0;
    text-align:center;
    cursor:pointer;
    transition:.25s;
}

.card:hover{
    transform:translateY(-6px) scale(1.02);
}

.card .icon{
    font-size:52px;
}

footer{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:#0b1220;
    padding:10px;
    display:flex;
    justify-content:space-around;
}

footer div{
    text-align:center;
    font-size:14px;
}
</style>

</head>

<body>

<header>
    <h1>📚 الموسوعة التعليمية الذكية</h1>
    <p>مناهج الجمهورية اليمنية - المرحلة الثانوية</p>
    <div id="clock"></div>
</header>

<div class="container">

    <div class="card" onclick="openPage('الصف الأول الثانوي')">
        <div class="icon">📘</div>
        <h2>الصف الأول الثانوي</h2>
    </div>

    <div class="card" onclick="openPage('الصف الثاني الثانوي')">
        <div class="icon">📗</div>
        <h2>الصف الثاني الثانوي</h2>
    </div>

    <!-- ربط الصف الثالث الثانوي بصفحة grade1.html -->
    <div class="card" onclick="window.location.href='grade1.html'">
        <div class="icon">📕</div>
        <h2>الصف الثالث الثانوي</h2>
    </div>

</div>

<footer>
    <div>🏠<br>الرئيسية</div>
    <div>🔍<br>بحث</div>
    <div>🤖<br>ذكاء</div>
    <div>⭐<br>المفضلة</div>
    <div>⚙️<br>الإعدادات</div>
</footer>

<script>
function updateClock(){
    const d = new Date();
    document.getElementById("clock").textContent =
        d.toLocaleString("ar");
}

setInterval(updateClock,1000);
updateClock();

function openPage(name){
    alert("سيتم ربط صفحة " + name + " في الخطوة القادمة.");
}
</script>

</body>
</html>
