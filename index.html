 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الطالب</title>

<style>
body {
  font-family: tahoma;
  background: linear-gradient(to bottom, #0b3d91, #1e90ff);
  text-align: center;
  color: white;
}

.box {
  background: white;
  color: black;
  width: 90%;
  max-width: 400px;
  margin: 100px auto;
  padding: 20px;
  border-radius: 15px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px;
  font-size: 16px;
}

button {
  padding: 10px 20px;
  background: #0b3d91;
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 16px;
}
</style>
</head>

<body>

<div class="box">
  <h2>🎓 تسجيل الطالب</h2>

  <input type="text" id="name" placeholder="أدخل الاسم الرباعي">

  <br>

  <button onclick="start()">ابدأ المسابقة</button>
</div>

<script>
function start() {
  var name = document.getElementById("name").value.trim();

  // تحقق من الاسم الرباعي
  if (name.split(" ").length < 4) {
    alert("يجب إدخال الاسم الرباعي");
    return;
  }

  // حفظ الاسم
  localStorage.setItem("studentName", name);

  // الانتقال لصفحة اللعبة
  window.location.href = "game.html";
}
</script>

</body>
</html>
