 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📸 معرض الصور - عرض عمودي</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <style>
        /* ===== CSS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        /* ===== رأس الصفحة ===== */
        .page-header {
            background: #fff;
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .page-header h1 {
            font-size: 24px;
            color: #1a1a1a;
        }

        .page-header h1 i {
            color: #1877f2;
        }

        .page-header .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #65676b;
        }

        .page-header .user-info .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
        }

        /* ===== زر إضافة صورة ===== */
        .upload-section {
            background: #fff;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .upload-section .upload-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            flex-shrink: 0;
        }

        .upload-section .upload-input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #e4e6eb;
            border-radius: 20px;
            background: #f0f2f5;
            cursor: pointer;
            transition: all 0.3s;
            color: #65676b;
            font-size: 14px;
        }

        .upload-section .upload-input:hover {
            background: #e4e6eb;
        }

        .upload-section .upload-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            background: #1877f2;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            white-space: nowrap;
        }

        .upload-section .upload-btn:hover {
            background: #166fe5;
            transform: scale(1.02);
        }

        /* ===== بطاقة المنشور ===== */
        .post-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-bottom: 20px;
            animation: fadeInUp 0.4s ease;
            transition: all 0.3s ease;
        }

        .post-card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        /* ===== رأس المنشور ===== */
        .post-header {
            padding: 14px 18px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f2f5;
        }

        .post-user {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .post-user-info {
            display: flex;
            flex-direction: column;
        }

        .post-username {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a1a;
        }

        .post-time {
            font-size: 12px;
            color: #65676b;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .post-time i {
            font-size: 10px;
        }

        .post-delete-btn {
            background: none;
            border: none;
            color: #65676b;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 50%;
            transition: all 0.2s;
            font-size: 16px;
        }

        .post-delete-btn:hover {
            background: #fee;
            color: #ff4d4d;
        }

        /* ===== صورة المنشور ===== */
        .post-image-wrapper {
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }

        .post-image-wrapper img {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: contain;
            display: block;
            background: #fff;
        }

        /* ===== أزرار التفاعل ===== */
        .post-actions {
            display: flex;
            justify-content: space-around;
            padding: 6px 16px;
            border-top: 1px solid #f0f2f5;
            border-bottom: 1px solid #f0f2f5;
        }

        .post-actions button {
            flex: 1;
            padding: 8px 6px;
            border: none;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #65676b;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .post-actions button:hover {
            background: #f0f2f5;
        }

        .post-actions button:active {
            transform: scale(0.95);
        }

        .post-actions button.liked {
            color: #1877f2;
        }

        .post-actions button.liked i {
            font-weight: 900;
        }

        .post-actions button i {
            font-size: 16px;
        }

        /* ===== قسم التعليقات ===== */
        .comments-section {
            padding: 10px 18px 14px;
            background: #fafafa;
            border-top: 1px solid #f0f2f5;
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .comments-header h4 {
            font-size: 13px;
            color: #65676b;
            font-weight: 500;
        }

        .comments-header .comment-count {
            background: #e4e6eb;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #65676b;
        }

        .comments-list {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .comments-list::-webkit-scrollbar {
            width: 4px;
        }

        .comments-list::-webkit-scrollbar-track {
            background: #f0f2f5;
            border-radius: 10px;
        }

        .comments-list::-webkit-scrollbar-thumb {
            background: #ccd0d5;
            border-radius: 10px;
        }

        .comment-item {
            display: flex;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #f0f2f5;
            animation: fadeIn 0.3s ease;
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .comment-body {
            flex: 1;
        }

        .comment-user {
            font-weight: 600;
            font-size: 12px;
            color: #1a1a1a;
        }

        .comment-text {
            font-size: 13px;
            color: #1a1a1a;
            word-wrap: break-word;
            margin-top: 1px;
        }

        .comment-time {
            font-size: 10px;
            color: #65676b;
            margin-top: 2px;
        }

        .no-comments {
            text-align: center;
            color: #65676b;
            font-size: 13px;
            padding: 15px 0;
        }

        .no-comments i {
            display: block;
            font-size: 28px;
            margin-bottom: 6px;
            opacity: 0.3;
        }

        /* ===== إضافة تعليق ===== */
        .add-comment {
            display: flex;
            gap: 8px;
            align-items: center;
            padding-top: 8px;
            border-top: 1px solid #f0f2f5;
        }

        .add-comment .comment-input-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .add-comment input {
            flex: 1;
            padding: 8px 14px;
            border: 1px solid #e4e6eb;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
            transition: border-color 0.3s;
            background: #f0f2f5;
        }

        .add-comment input:focus {
            border-color: #1877f2;
            background: #fff;
        }

        .add-comment input::placeholder {
            color: #65676b;
        }

        .add-comment .send-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: #1877f2;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .add-comment .send-btn:hover {
            background: #166fe5;
            transform: scale(1.05);
        }

        .add-comment .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== رسالة لا توجد صور ===== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }

        .empty-state i {
            font-size: 80px;
            color: #ccd0d5;
            margin-bottom: 16px;
        }

        .empty-state h3 {
            color: #65676b;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: #8a8f94;
            font-size: 14px;
        }

        /* ===== رسائل الإشعار ===== */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== أنيميشن ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== التجاوب ===== */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .page-header {
                padding: 14px 16px;
            }
            .page-header h1 {
                font-size: 20px;
            }
            .upload-section {
                padding: 12px 14px;
                flex-wrap: wrap;
            }
            .upload-section .upload-input {
                font-size: 13px;
                padding: 8px 14px;
            }
            .upload-section .upload-btn {
                font-size: 13px;
                padding: 8px 16px;
                width: 100%;
            }
            .post-header {
                padding: 10px 14px 8px;
            }
            .post-actions button {
                font-size: 12px;
                padding: 6px 4px;
            }
            .post-actions button i {
                font-size: 14px;
            }
            .comments-section {
                padding: 8px 14px 10px;
            }
            .post-image-wrapper img {
                max-height: 300px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- ===== رأس الصفحة ===== -->
        <div class="page-header">
            <h1><i class="fa-solid fa-images"></i> معرض الصور</h1>
            <div class="user-info">
                <span id="userIdDisplay">مستخدم</span>
                <div class="avatar" id="userAvatar">
                    <i class="fa-regular fa-user"></i>
                </div>
            </div>
        </div>

        <!-- ===== قسم إضافة صورة ===== -->
        <div class="upload-section">
            <div class="upload-avatar">
                <i class="fa-regular fa-user"></i>
            </div>
            <input type="text" class="upload-input" id="uploadInput" placeholder="ماذا تريد مشاركته؟" readonly />
            <button class="upload-btn" id="addBtn">
                <i class="fa-solid fa-plus"></i> إضافة
            </button>
            <input type="file" id="fileInput" accept="image/*" hidden />
        </div>

        <!-- ===== حاوية الصور ===== -->
        <div id="postsContainer">
            <!-- سيتم إضافة الصور هنا عبر JavaScript -->
        </div>

        <!-- ===== حالة فارغة ===== -->
        <div class="empty-state" id="emptyState">
            <i class="fa-regular fa-images"></i>
            <h3>لا توجد صور</h3>
            <p>أضف صورتك الأولى لمشاركتها مع الآخرين</p>
        </div>
    </div>

    <!-- ===== رسالة إشعار ===== -->
    <div id="toast"></div>

    <script>
        // ============================================================
        // ===== جافا سكريبت - عرض عمودي مع تعليقات =====
        // ============================================================

        // ===== معرف المستخدم =====
        function getUserId() {
            let userId = localStorage.getItem("userId");
            if (!userId) {
                userId = "user_" + Date.now() + "_" + Math.random().toString(36).substring(2, 9);
                localStorage.setItem("userId", userId);
            }
            return userId;
        }
        const currentUserId = getUserId();
        document.getElementById("userIdDisplay").textContent = "مستخدم " + currentUserId.substring(0, 6);

        // ===== حالة المشرف =====
        const ADMIN_PASSWORD = "admin123";
        let isAdmin = localStorage.getItem("isAdmin") === "true";

        // ===== دالة الإشعارات =====
        function showToast(message, duration = 2500) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.add("show");
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove("show"), duration);
        }

        // ===== دالة ألوان الأفاتار =====
        function getAvatarColor(userId) {
            const colors = ['#4facfe', '#a18cd1', '#fbc2eb', '#f6d365', '#ff6b6b', '#4ecdc4', '#45b7d1', '#96c93d', '#f39c12',
                '#e74c3c'
            ];
            let hash = 0;
            for (let i = 0; i < userId.length; i++) {
                hash = userId.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        // ===== تنسيق النص =====
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ===== الحصول على وقت منشور =====
        function getPostTime(timestamp) {
            const now = new Date();
            const postDate = new Date(timestamp);
            const diff = Math.floor((now - postDate) / 1000);

            if (diff < 60) return 'الآن';
            if (diff < 3600) return Math.floor(diff / 60) + ' دقيقة';
            if (diff < 86400) return Math.floor(diff / 3600) + ' ساعة';
            if (diff < 604800) return Math.floor(diff / 86400) + ' يوم';
            return postDate.toLocaleDateString('ar-EG');
        }

        // ============================================================
        // ===== إدارة الصور =====
        // ============================================================

        // ===== تحميل البيانات من localStorage =====
        function loadPosts() {
            try {
                const data = localStorage.getItem("postsData");
                if (data) {
                    return JSON.parse(data);
                }
            } catch (e) {
                console.error("خطأ في تحميل البيانات", e);
            }
            return [];
        }

        // ===== حفظ البيانات في localStorage =====
        function savePosts(posts) {
            localStorage.setItem("postsData", JSON.stringify(posts));
        }

        // ===== إضافة صورة جديدة =====
        function addPost(imageSrc) {
            const posts = loadPosts();

            const newPost = {
                id: Date.now(),
                image: imageSrc,
                userId: currentUserId,
                timestamp: Date.now(),
                likes: 0,
                likedBy: [],
                comments: []
            };

            posts.unshift(newPost); // إضافة في البداية
            savePosts(posts);
            renderPosts();
            showToast("✅ تم نشر الصورة بنجاح");
        }

        // ===== حذف صورة =====
        function deletePost(postId) {
            let posts = loadPosts();
            const post = posts.find(p => p.id === postId);

            if (!post) return;

            // التحقق من الصلاحية
            const canDelete = post.userId === currentUserId || isAdmin;

            if (!canDelete) {
                showToast("⛔ لا يمكنك حذف صورة مستخدم آخر", 3000);
                return;
            }

            if (!confirm("هل أنت متأكد من حذف هذه الصورة؟")) return;

            posts = posts.filter(p => p.id !== postId);
            savePosts(posts);
            renderPosts();
            showToast("🗑️ تم حذف الصورة");
        }

        // ===== الإعجاب بصورة =====
        function toggleLike(postId) {
            const posts = loadPosts();
            const post = posts.find(p => p.id === postId);
            if (!post) return;

            const index = post.likedBy.indexOf(currentUserId);
            if (index === -1) {
                post.likedBy.push(currentUserId);
                post.likes++;
            } else {
                post.likedBy.splice(index, 1);
                post.likes--;
            }

            savePosts(posts);
            renderPosts();
        }

        // ===== إضافة تعليق =====
        function addComment(postId, text) {
            if (!text || text.trim() === "") return;

            const posts = loadPosts();
            const post = posts.find(p => p.id === postId);
            if (!post) return;

            post.comments.push({
                id: Date.now(),
                userId: currentUserId,
                text: text.trim(),
                timestamp: Date.now()
            });

            savePosts(posts);
            renderPosts();
            showToast("💬 تم إضافة تعليق");
        }

        // ============================================================
        // ===== عرض الصور =====
        // ============================================================

        function renderPosts() {
            const posts = loadPosts();
            const container = document.getElementById("postsContainer");
            const emptyState = document.getElementById("emptyState");

            if (posts.length === 0) {
                container.innerHTML = "";
                emptyState.style.display = "block";
                return;
            }

            emptyState.style.display = "none";
            container.innerHTML = "";

            posts.forEach((post, index) => {
                const postCard = document.createElement("div");
                postCard.className = "post-card";
                postCard.style.animationDelay = (index * 0.05) + "s";

                const isLiked = post.likedBy && post.likedBy.includes(currentUserId);
                const userName = "مستخدم " + post.userId.substring(0, 6);
                const avatarColor = getAvatarColor(post.userId);
                const timeAgo = getPostTime(post.timestamp);

                // بناء التعليقات
                let commentsHTML = '';
                if (post.comments && post.comments.length > 0) {
                    post.comments.forEach(comment => {
                        const commentUser = "مستخدم " + comment.userId.substring(0, 6);
                        const commentColor = getAvatarColor(comment.userId);
                        const commentTime = getPostTime(comment.timestamp);
                        commentsHTML += `
                            <div class="comment-item">
                                <div class="comment-avatar" style="background: ${commentColor};">
                                    ${commentUser.charAt(0).toUpperCase()}
                                </div>
                                <div class="comment-body">
                                    <div class="comment-user">${commentUser}</div>
                                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                                    <div class="comment-time">${commentTime}</div>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    commentsHTML = `
                        <div class="no-comments">
                            <i class="fa-regular fa-comment-dots"></i>
                            <p>لا توجد تعليقات بعد</p>
                        </div>
                    `;
                }

                postCard.innerHTML = `
                    <!-- رأس المنشور -->
                    <div class="post-header">
                        <div class="post-user">
                            <div class="post-avatar" style="background: ${avatarColor};">
                                ${userName.charAt(0).toUpperCase()}
                            </div>
                            <div class="post-user-info">
                                <span class="post-username">${userName}</span>
                                <span class="post-time">
                                    <i class="fa-regular fa-clock"></i>
                                    ${timeAgo}
                                    <span>·</span>
                                    <i class="fa-solid fa-globe"></i>
                                </span>
                            </div>
                        </div>
                        <button class="post-delete-btn" onclick="deletePost(${post.id})" title="حذف">
                            <i class="fa-regular fa-trash-can"></i>
                        </button>
                    </div>

                    <!-- الصورة -->
                    <div class="post-image-wrapper">
                        <img src="${post.image}" alt="صورة منشور" loading="lazy" />
                    </div>

                    <!-- أزرار التفاعل -->
                    <div class="post-actions">
                        <button class="${isLiked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                            <i class="${isLiked ? 'fa-solid' : 'fa-regular'} fa-thumbs-up"></i>
                            <span>إعجاب</span>
                            ${post.likes > 0 ? `<span style="font-size:11px;color:#65676b;">(${post.likes})</span>` : ''}
                        </button>
                        <button onclick="toggleComments(${post.id})">
                            <i class="fa-regular fa-comment"></i>
                            <span>تعليق</span>
                            ${post.comments && post.comments.length > 0 ? `<span style="font-size:11px;color:#65676b;">(${post.comments.length})</span>` : ''}
                        </button>
                        <button onclick="sharePost('${post.image}')">
                            <i class="fa-regular fa-share-from-square"></i>
                            <span>مشاركة</span>
                        </button>
                    </div>

                    <!-- التعليقات -->
                    <div class="comments-section" id="comments-${post.id}">
                        <div class="comments-header">
                            <h4>💬 التعليقات</h4>
                            <span class="comment-count">${post.comments ? post.comments.length : 0}</span>
                        </div>
                        <div class="comments-list">
                            ${commentsHTML}
                        </div>
                        <div class="add-comment">
                            <div class="comment-input-avatar">
                                <i class="fa-regular fa-user"></i>
                            </div>
                            <input type="text" id="commentInput-${post.id}" placeholder="اكتب تعليقاً..." />
                            <button class="send-btn" onclick="handleSendComment(${post.id})">
                                <i class="fa-regular fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                `;

                container.appendChild(postCard);

                // إضافة حدث Enter للتعليق
                const commentInput = postCard.querySelector(`#commentInput-${post.id}`);
                commentInput.onkeydown = (e) => {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        handleSendComment(post.id);
                    }
                };
            });
        }

        // ===== وظائف مساعدة =====
        function handleSendComment(postId) {
            const input = document.getElementById(`commentInput-${postId}`);
            if (input) {
                addComment(postId, input.value);
            }
        }

        function toggleComments(postId) {
            const section = document.getElementById(`comments-${postId}`);
            if (section) {
                section.style.display = section.style.display === "none" ? "block" : "none";
            }
        }

        function sharePost(imageSrc) {
            if (navigator.share) {
                navigator.share({
                    title: "📸 معرض الصور",
                    text: "شاهد هذه الصورة الرائعة!",
                }).catch(() => {});
            } else {
                showToast("📋 تم نسخ رابط الصورة للحافظة");
                navigator.clipboard.writeText("📸 شاهد هذه الصورة من معرضي!");
            }
        }

        // ============================================================
        // ===== إضافة صورة جديدة =====
        // ============================================================

        const fileInput = document.getElementById("fileInput");
        const addBtn = document.getElementById("addBtn");
        const uploadInput = document.getElementById("uploadInput");

        addBtn.onclick = () => fileInput.click();
        uploadInput.onclick = () => fileInput.click();

        fileInput.onchange = function() {
            const file = this.files[0];
            if (!file) return;

            if (!file.type.startsWith("image/")) {
                showToast("⚠️ الرجاء اختيار ملف صورة فقط");
                this.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                addPost(e.target.result);
            };
            reader.readAsDataURL(file);
            this.value = "";
        };

        // ============================================================
        // ===== التحقق من المشرف (النقر المزدوج على الأفاتار) =====
        // ============================================================

        document.getElementById("userAvatar").addEventListener("dblclick", () => {
            const password = prompt("🔐 أدخل الرمز السري للمشرف:");
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                localStorage.setItem("isAdmin", "true");
                showToast("✅ تم تفعيل صلاحية المشرف", 3000);
                renderPosts();
            } else if (password !== null) {
                showToast("❌ رمز سري غير صحيح", 2000);
            }
        });

        // ============================================================
        // ===== تحميل الصور عند بدء الصفحة =====
        // ============================================================

        renderPosts();

        // ===== رسالة ترحيب =====
        setTimeout(() => {
            const posts = loadPosts();
            if (posts.length === 0) {
                showToast("👋 مرحباً! أضف صورتك الأولى", 2500);
            } else {
                showToast(`👋 مرحباً! لديك ${posts.length} صورة`, 2000);
            }
        }, 500);
    </script>
</body>
</html>
