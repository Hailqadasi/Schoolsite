 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تفعيل التطبيق</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}
.box{
background:#fff;
padding:30px;
width:320px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
text-align:center;
}
input,button{
width:100%;
padding:12px;
font-size:18px;
margin-bottom:15px;
box-sizing:border-box;
}
button{
border:none;
background:#28a745;
color:#fff;
cursor:pointer;
}
#result{
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h2>إدخال كرت التفعيل</h2>

<input id="code" placeholder="رقم الكرت">

<button onclick="checkCard()">تفعيل</button>

<div id="result">جاهز</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
const result = document.getElementById("result");

// 🔁 إذا الجهاز مفعل مسبقًا → ادخل مباشرة
if(localStorage.getItem("activated") === "true"){
  window.location.href = "Themain.html";
}

function msg(t){
  result.innerText = t;
}

async function checkCard(){

  const supabase = window.supabase.createClient(
    "https://eorcwponppumcppbmylt.supabase.co",
    "ضع_المفتاح_هنا"
  );

  let code = document.getElementById("code").value.trim();

  if(!code){
    msg("أدخل رقم الكرت");
    return;
  }

  msg("جاري التحقق...");

  try{

    const { data, error } = await supabase
      .from("scards")
      .select("*")
      .eq("code", code)
      .single();

    if(error){
      msg("❌ الكرت غير موجود");
      return;
    }

    if(data.used){
      msg("❌ الكرت مستخدم مسبقًا");
      return;
    }

    // 🆔 إنشاء معرف جهاز
    let deviceId = localStorage.getItem("device_id");
    if(!deviceId){
      deviceId = "dev_" + Math.random().toString(36).substring(2,10);
      localStorage.setItem("device_id", deviceId);
    }

    // ✅ تفعيل الكرت
    const { error: updateError } = await supabase
      .from("scards")
      .update({
        used: true,
        device: deviceId
      })
      .eq("code", code);

    if(updateError){
      msg("خطأ أثناء التفعيل");
      return;
    }

    // 💾 حفظ حالة التفعيل
    localStorage.setItem("activated", "true");

    msg("✅ تم التفعيل... جاري الدخول");

    // 🚀 الانتقال للصفحة الرئيسية
    setTimeout(()=>{
      window.location.href = "Themain.html";
    },1000);

  }catch(e){
    msg("فشل الاتصال");
    console.log(e);
  }

}
</script>

</body>
</html>
