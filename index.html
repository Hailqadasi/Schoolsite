 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📸 معرض الصور - تصميم فيسبوك</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />

    <style>
        /* ===== CSS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        /* ===== بطاقة شبيهة بفيسبوك ===== */
        .post-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .post-card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        /* ===== رأس المنشور ===== */
        .post-header {
            padding: 16px 20px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f2f5;
        }

        .post-user {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .post-user-info {
            display: flex;
            flex-direction: column;
        }

        .post-username {
            font-weight: 600;
            font-size: 15px;
            color: #1a1a1a;
        }

        .post-time {
            font-size: 12px;
            color: #65676b;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .post-time i {
            font-size: 10px;
        }

        .post-options {
            color: #65676b;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .post-options:hover {
            background: #f0f2f5;
        }

        /* ===== محتوى المنشور ===== */
        .post-content {
            padding: 0 0 8px;
        }

        .post-text {
            padding: 0 20px 8px;
            font-size: 15px;
            color: #1a1a1a;
            line-height: 1.5;
            min-height: 20px;
        }

        .post-text .placeholder-text {
            color: #65676b;
            font-style: italic;
        }

        /* ===== صورة المنشور ===== */
        .post-image-wrapper {
            position: relative;
            background: #f0f2f5;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .post-image-wrapper img {
            width: 100%;
            height: auto;
            max-height: 550px;
            object-fit: contain;
            display: none;
            background: #fff;
        }

        .post-image-wrapper .image-placeholder {
            text-align: center;
            color: #65676b;
            padding: 40px 20px;
        }

        .post-image-wrapper .image-placeholder i {
            font-size: 80px;
            margin-bottom: 12px;
            display: block;
            opacity: 0.3;
        }

        .post-image-wrapper .image-placeholder p {
            font-size: 14px;
        }

        /* ===== أزرار التفاعل ===== */
        .post-actions {
            display: flex;
            justify-content: space-around;
            padding: 8px 16px;
            border-top: 1px solid #f0f2f5;
            border-bottom: 1px solid #f0f2f5;
        }

        .post-actions button {
            flex: 1;
            padding: 10px 8px;
            border: none;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #65676b;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .post-actions button:hover {
            background: #f0f2f5;
        }

        .post-actions button:active {
            transform: scale(0.95);
        }

        .post-actions button.liked {
            color: #1877f2;
        }

        .post-actions button.liked i {
            font-weight: 900;
        }

        .post-actions button i {
            font-size: 18px;
        }

        .post-actions button.danger:hover {
            color: #ff4d4d;
        }

        /* ===== قسم التعليقات ===== */
        .comments-section {
            padding: 12px 20px 16px;
            background: #fafafa;
        }

        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .comments-header h4 {
            font-size: 14px;
            color: #65676b;
            font-weight: 500;
        }

        .comments-header .comment-count {
            background: #e4e6eb;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #65676b;
        }

        /* ===== قائمة التعليقات ===== */
        .comments-list {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 12px;
        }

        .comments-list::-webkit-scrollbar {
            width: 4px;
        }

        .comments-list::-webkit-scrollbar-track {
            background: #f0f2f5;
            border-radius: 10px;
        }

        .comments-list::-webkit-scrollbar-thumb {
            background: #ccd0d5;
            border-radius: 10px;
        }

        .comment-item {
            display: flex;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f0f2f5;
            animation: fadeIn 0.3s ease;
        }

        .comment-item:last-child {
            border-bottom: none;
        }

        .comment-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #a18cd1, #fbc2eb);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .comment-body {
            flex: 1;
        }

        .comment-user {
            font-weight: 600;
            font-size: 13px;
            color: #1a1a1a;
        }

        .comment-text {
            font-size: 14px;
            color: #1a1a1a;
            word-wrap: break-word;
            margin-top: 2px;
        }

        .comment-time {
            font-size: 11px;
            color: #65676b;
            margin-top: 2px;
        }

        .no-comments {
            text-align: center;
            color: #65676b;
            font-size: 14px;
            padding: 20px 0;
        }

        .no-comments i {
            display: block;
            font-size: 30px;
            margin-bottom: 8px;
            opacity: 0.3;
        }

        /* ===== إضافة تعليق ===== */
        .add-comment {
            display: flex;
            gap: 10px;
            align-items: center;
            padding-top: 8px;
            border-top: 1px solid #f0f2f5;
        }

        .add-comment .comment-input-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .add-comment input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #e4e6eb;
            border-radius: 20px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            background: #f0f2f5;
        }

        .add-comment input:focus {
            border-color: #1877f2;
            background: #fff;
        }

        .add-comment input::placeholder {
            color: #65676b;
        }

        .add-comment .send-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: #1877f2;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .add-comment .send-btn:hover {
            background: #166fe5;
            transform: scale(1.05);
        }

        .add-comment .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== زر إضافة صورة (فيسبوك) ===== */
        .facebook-upload-btn {
            width: 100%;
            padding: 14px;
            border: none;
            background: #1877f2;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .facebook-upload-btn:hover {
            background: #166fe5;
            transform: scale(1.01);
        }

        .facebook-upload-btn:active {
            transform: scale(0.98);
        }

        /* ===== رسائل الإشعار ===== */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            opacity: 0;
            pointer-events: none;
            z-index: 999;
            max-width: 90%;
            text-align: center;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== أنيميشن ===== */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes zoomIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* ===== التجاوب ===== */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .post-header {
                padding: 12px 16px 10px;
            }
            .post-text {
                padding: 0 16px 6px;
                font-size: 14px;
            }
            .post-image-wrapper {
                min-height: 200px;
            }
            .post-actions button {
                font-size: 12px;
                padding: 8px 4px;
            }
            .post-actions button i {
                font-size: 16px;
            }
            .comments-section {
                padding: 10px 16px 12px;
            }
            .add-comment input {
                font-size: 13px;
                padding: 8px 12px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="post-card">
            <!-- ===== رأس المنشور ===== -->
            <div class="post-header">
                <div class="post-user">
                    <div class="post-avatar" id="userAvatar">
                        <i class="fa-regular fa-user"></i>
                    </div>
                    <div class="post-user-info">
                        <span class="post-username" id="userName">مستخدم معرض الصور</span>
                        <span class="post-time">
                            <i class="fa-regular fa-clock"></i>
                            <span id="postTime">الآن</span>
                            <span>·</span>
                            <i class="fa-solid fa-globe"></i>
                        </span>
                    </div>
                </div>
                <div class="post-options" id="adminIndicator" style="display:none;" title="مشرف">
                    <i class="fa-solid fa-shield-halved" style="color:#1877f2;"></i>
                </div>
            </div>

            <!-- ===== محتوى المنشور ===== -->
            <div class="post-content">
                <div class="post-text" id="postText">
                    <span class="placeholder-text">📸 أضف صورة لمشاركتها مع الآخرين</span>
                </div>

                <div class="post-image-wrapper">
                    <img id="preview" />
                    <div class="image-placeholder" id="imagePlaceholder">
                        <i class="fa-regular fa-image"></i>
                        <p>لا توجد صورة حالياً</p>
                    </div>
                </div>
            </div>

            <!-- ===== زر إضافة صورة (شبيه بفيسبوك) ===== -->
            <div style="padding: 12px 20px;">
                <button class="facebook-upload-btn" id="addBtn">
                    <i class="fa-solid fa-plus"></i>
                    إضافة صورة جديدة
                </button>
                <input type="file" id="fileInput" accept="image/*" hidden />
            </div>

            <!-- ===== أزرار التفاعل ===== -->
            <div class="post-actions">
                <button id="likeBtn">
                    <i class="fa-regular fa-thumbs-up"></i>
                    <span>إعجاب</span>
                    <span id="likesCount" style="font-size:12px;color:#65676b;"></span>
                </button>
                <button id="commentToggleBtn">
                    <i class="fa-regular fa-comment"></i>
                    <span>تعليق</span>
                    <span id="commentCount" style="font-size:12px;color:#65676b;"></span>
                </button>
                <button id="shareBtn">
                    <i class="fa-regular fa-share-from-square"></i>
                    <span>مشاركة</span>
                </button>
                <button id="deleteBtn" class="danger">
                    <i class="fa-regular fa-trash-can"></i>
                    <span>حذف</span>
                </button>
            </div>

            <!-- ===== قسم التعليقات ===== -->
            <div class="comments-section" id="commentsSection">
                <div class="comments-header">
                    <h4>💬 التعليقات</h4>
                    <span class="comment-count" id="commentCountBadge">0</span>
                </div>

                <div class="comments-list" id="commentsList">
                    <div class="no-comments" id="noComments">
                        <i class="fa-regular fa-comment-dots"></i>
                        <p>لا توجد تعليقات بعد، كن أول من يعلق!</p>
                    </div>
                </div>

                <div class="add-comment">
                    <div class="comment-input-avatar">
                        <i class="fa-regular fa-user"></i>
                    </div>
                    <input type="text" id="commentInput" placeholder="اكتب تعليقاً..." />
                    <button class="send-btn" id="sendCommentBtn">
                        <i class="fa-regular fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== رسالة إشعار ===== -->
    <div id="toast"></div>

    <script>
        // ============================================================
        // ===== جافا سكريبت - تصميم فيسبوك =====
        // ============================================================

        // ===== العناصر =====
        const fileInput = document.getElementById("fileInput");
        const addBtn = document.getElementById("addBtn");
        const preview = document.getElementById("preview");
        const imagePlaceholder = document.getElementById("imagePlaceholder");
        const postText = document.getElementById("postText");
        const postTime = document.getElementById("postTime");

        const likeBtn = document.getElementById("likeBtn");
        const likesCount = document.getElementById("likesCount");

        const deleteBtn = document.getElementById("deleteBtn");
        const shareBtn = document.getElementById("shareBtn");
        const commentToggleBtn = document.getElementById("commentToggleBtn");
        const commentsSection = document.getElementById("commentsSection");
        const commentsList = document.getElementById("commentsList");
        const noComments = document.getElementById("noComments");
        const commentInput = document.getElementById("commentInput");
        const sendCommentBtn = document.getElementById("sendCommentBtn");
        const commentCountBadge = document.getElementById("commentCountBadge");

        // ===== معرف المستخدم =====
        function getUserId() {
            let userId = localStorage.getItem("userId");
            if (!userId) {
                userId = "user_" + Date.now() + "_" + Math.random().toString(36).substring(2, 9);
                localStorage.setItem("userId", userId);
            }
            return userId;
        }
        const currentUserId = getUserId();

        // ===== حالة المشرف =====
        const ADMIN_PASSWORD = "admin123";
        let isAdmin = localStorage.getItem("isAdmin") === "true";

        if (isAdmin) {
            document.getElementById("adminIndicator").style.display = "block";
        }

        // ===== دالة الإشعارات =====
        function showToast(message, duration = 2500) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.add("show");
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove("show"), duration);
        }

        // ===== تحديث وقت المنشور =====
        function updatePostTime() {
            const now = new Date();
            postTime.textContent = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
        }
        updatePostTime();

        // ============================================================
        // ===== إدارة الصورة =====
        // ============================================================

        // ===== فتح اختيار الملف =====
        addBtn.onclick = () => fileInput.click();

        // ===== اختيار صورة جديدة =====
        fileInput.onchange = function() {
            const file = this.files[0];
            if (!file) return;

            if (!file.type.startsWith("image/")) {
                showToast("⚠️ الرجاء اختيار ملف صورة فقط");
                this.value = "";
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const image = e.target.result;
                preview.src = image;
                preview.style.display = "block";
                imagePlaceholder.style.display = "none";
                postText.innerHTML = "📸 تمت مشاركة صورة جديدة";

                const imageData = {
                    src: image,
                    userId: currentUserId,
                    timestamp: Date.now()
                };
                localStorage.setItem("savedImage", JSON.stringify(imageData));
                showToast("✅ تم نشر الصورة بنجاح");
                updatePostTime();
            };
            reader.readAsDataURL(file);
            this.value = "";
        };

        // ===== تحميل الصورة المحفوظة =====
        const savedImageData = localStorage.getItem("savedImage");
        if (savedImageData) {
            try {
                const data = JSON.parse(savedImageData);
                preview.src = data.src;
                preview.style.display = "block";
                imagePlaceholder.style.display = "none";
                postText.innerHTML = "📸 تمت مشاركة صورة جديدة";
            } catch (e) {
                localStorage.removeItem("savedImage");
            }
        }

        // ============================================================
        // ===== الإعجابات =====
        // ============================================================

        let likes = Number(localStorage.getItem("likes")) || 0;
        updateLikesDisplay();

        function updateLikesDisplay() {
            likesCount.textContent = likes > 0 ? likes : "";
            if (likes > 0) {
                likeBtn.classList.add("liked");
                likeBtn.querySelector("i").className = "fa-solid fa-thumbs-up";
            } else {
                likeBtn.classList.remove("liked");
                likeBtn.querySelector("i").className = "fa-regular fa-thumbs-up";
            }
        }

        likeBtn.onclick = () => {
            likes++;
            localStorage.setItem("likes", likes);
            updateLikesDisplay();
            likeBtn.style.transform = "scale(1.1)";
            setTimeout(() => (likeBtn.style.transform = ""), 200);
            showToast("👍 تم الإعجاب!");
        };

        // ============================================================
        // ===== التعليقات =====
        // ============================================================

        let comments = [];

        // تحميل التعليقات
        function loadComments() {
            try {
                const saved = localStorage.getItem("comments");
                if (saved) {
                    comments = JSON.parse(saved);
                }
            } catch (e) {
                comments = [];
            }
            renderComments();
        }

        // حفظ التعليقات
        function saveComments() {
            localStorage.setItem("comments", JSON.stringify(comments));
        }

        // عرض التعليقات
        function renderComments() {
            commentsList.innerHTML = "";

            if (comments.length === 0) {
                commentsList.innerHTML = `
                    <div class="no-comments">
                        <i class="fa-regular fa-comment-dots"></i>
                        <p>لا توجد تعليقات بعد، كن أول من يعلق!</p>
                    </div>
                `;
                commentCountBadge.textContent = "0";
                return;
            }

            comments.forEach((comment, index) => {
                const commentDiv = document.createElement("div");
                commentDiv.className = "comment-item";
                commentDiv.innerHTML = `
                    <div class="comment-avatar" style="background: ${getAvatarColor(comment.userId)};">
                        ${comment.userName.charAt(0).toUpperCase()}
                    </div>
                    <div class="comment-body">
                        <div class="comment-user">${comment.userName}</div>
                        <div class="comment-text">${escapeHtml(comment.text)}</div>
                        <div class="comment-time">${comment.time}</div>
                    </div>
                `;
                commentsList.appendChild(commentDiv);
            });

            commentCountBadge.textContent = comments.length;
            commentsList.scrollTop = commentsList.scrollHeight;
        }

        // ألوان عشوائية للأفاتار
        function getAvatarColor(userId) {
            const colors = ['#4facfe', '#a18cd1', '#fbc2eb', '#f6d365', '#ff6b6b', '#4ecdc4', '#45b7d1', '#96c93d'];
            let hash = 0;
            for (let i = 0; i < userId.length; i++) {
                hash = userId.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        // تنسيق النص
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // إضافة تعليق
        function addComment(text) {
            if (!text || text.trim() === "") return;

            const userName = "مستخدم " + currentUserId.substring(0, 6);
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });

            comments.push({
                id: Date.now(),
                userId: currentUserId,
                userName: userName,
                text: text.trim(),
                time: timeStr,
                timestamp: now.getTime()
            });

            saveComments();
            renderComments();
            commentInput.value = "";
            showToast("💬 تم إضافة تعليقك");

            // إظهار قسم التعليقات تلقائياً
            commentsSection.style.display = "block";
        }

        // ===== إرسال التعليق =====
        sendCommentBtn.onclick = () => {
            addComment(commentInput.value);
        };

        commentInput.onkeydown = (e) => {
            if (e.key === "Enter") {
                e.preventDefault();
                addComment(commentInput.value);
            }
        };

        // ===== تبديل إظهار/إخفاء التعليقات =====
        let commentsVisible = true;

        commentToggleBtn.onclick = () => {
            commentsVisible = !commentsVisible;
            commentsSection.style.display = commentsVisible ? "block" : "none";
            commentToggleBtn.querySelector("span").textContent = commentsVisible ? "تعليق" : "تعليق";
        };

        // تحميل التعليقات عند البدء
        loadComments();

        // ============================================================
        // ===== حذف الصورة =====
        // ============================================================

        deleteBtn.onclick = () => {
            const hasImage = preview.src && preview.style.display !== "none";
            if (!hasImage) {
                showToast("⚠️ لا توجد صورة لحذفها");
                return;
            }

            let imageOwnerId = null;
            const savedData = localStorage.getItem("savedImage");
            if (savedData) {
                try {
                    const data = JSON.parse(savedData);
                    imageOwnerId = data.userId;
                } catch (e) {}
            }

            const canDelete = !imageOwnerId || imageOwnerId === currentUserId || isAdmin;

            if (!canDelete) {
                showToast("⛔ لا يمكنك حذف صورة مستخدم آخر", 3000);
                return;
            }

            if (confirm("هل أنت متأكد من حذف هذه الصورة؟")) {
                preview.removeAttribute("src");
                preview.style.display = "none";
                imagePlaceholder.style.display = "flex";
                postText.innerHTML = '<span class="placeholder-text">📸 أضف صورة لمشاركتها مع الآخرين</span>';
                localStorage.removeItem("savedImage");
                showToast("🗑️ تم حذف الصورة");
            }
        };

        // ============================================================
        // ===== المشاركة =====
        // ============================================================

        shareBtn.onclick = async () => {
            const hasImage = preview.src && preview.style.display !== "none";

            if (!hasImage) {
                showToast("⚠️ لا توجد صورة للمشاركة");
                return;
            }

            try {
                const response = await fetch(preview.src);
                const blob = await response.blob();

                if (navigator.share) {
                    await navigator.share({
                        title: "📸 معرض الصور",
                        text: "شارك صورة رائعة!",
                        files: [new File([blob], "image.jpg", { type: blob.type })],
                    });
                    showToast("✅ تمت المشاركة بنجاح");
                } else {
                    await navigator.clipboard.writeText("📸 شاهد هذه الصورة من معرضي!");
                    showToast("📋 تم نسخ النص للحافظة");
                }
            } catch (err) {
                if (err.name !== "AbortError") {
                    showToast("⚠️ حدث خطأ أثناء المشاركة");
                }
            }
        };

        // ============================================================
        // ===== التحقق من المشرف (النقر المزدوج على الأيقونة) =====
        // ============================================================

        document.getElementById("adminIndicator").addEventListener("dblclick", () => {
            const password = prompt("🔐 أدخل الرمز السري للمشرف:");
            if (password === ADMIN_PASSWORD) {
                isAdmin = true;
                localStorage.setItem("isAdmin", "true");
                document.getElementById("adminIndicator").style.display = "block";
                showToast("✅ تم تفعيل صلاحية المشرف", 3000);
            } else if (password !== null) {
                showToast("❌ رمز سري غير صحيح", 2000);
            }
        });

        // ===== رسالة ترحيب =====
        setTimeout(() => {
            showToast("👋 مرحباً بك في معرض الصور!", 2000);
        }, 500);
    </script>
</body>
</html>
