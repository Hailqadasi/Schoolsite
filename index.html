 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>📸 معرض الصور</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <style>
        /* ===== تنسيقات مبسطة ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        /* ===== نافذة تسجيل الدخول ===== */
        .login-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .login-overlay.active {
            display: flex;
        }
        .login-box {
            background: #fff;
            border-radius: 20px;
            padding: 40px 35px;
            max-width: 420px;
            width: 90%;
            text-align: center;
        }
        .login-box .login-icon {
            font-size: 64px;
            color: #1877f2;
            margin-bottom: 16px;
        }
        .login-box h2 {
            font-size: 24px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .login-box p {
            font-size: 14px;
            color: #65676b;
            margin-bottom: 24px;
        }
        .login-box input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e4e6eb;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            background: #f0f2f5;
        }
        .login-box input:focus {
            border-color: #1877f2;
            background: #fff;
        }
        .login-box .login-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #1877f2;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
            transition: all 0.3s;
        }
        .login-box .login-btn:hover {
            background: #166fe5;
        }
        .login-box .login-error {
            color: #ff4d4d;
            font-size: 13px;
            margin-top: 8px;
            display: none;
        }
        .login-box .login-error.show {
            display: block;
        }

        /* ===== رأس الصفحة ===== */
        .page-header {
            background: #fff;
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .page-header h1 {
            font-size: 22px;
            color: #1a1a1a;
        }
        .page-header h1 i {
            color: #1877f2;
        }
        .page-header .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 13px;
            color: #65676b;
            cursor: pointer;
            padding: 4px 12px 4px 8px;
            border-radius: 30px;
            background: #f0f2f5;
        }
        .page-header .user-info .user-name-display {
            font-weight: 600;
            color: #1a1a1a;
            font-size: 14px;
        }
        .page-header .user-info .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            font-size: 16px;
        }
        .back-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: #e4e6eb;
            color: #65676b;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            display: none;
        }
        .back-btn.visible {
            display: inline-block;
        }

        /* ===== قسم إضافة منشور ===== */
        .upload-section {
            background: #fff;
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }
        .upload-section .upload-header {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .upload-section .upload-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 600;
            flex-shrink: 0;
            font-size: 18px;
        }
        .upload-section .upload-textarea {
            flex: 1;
            min-height: 60px;
            padding: 10px 14px;
            border: 1px solid #e4e6eb;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            resize: vertical;
            background: #f0f2f5;
            font-family: inherit;
        }
        .upload-section .upload-textarea:focus {
            border-color: #1877f2;
            background: #fff;
        }
        .upload-section .upload-textarea::placeholder {
            color: #65676b;
        }
        .upload-section .upload-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            flex-wrap: wrap;
            gap: 10px;
            padding-top: 12px;
            border-top: 1px solid #f0f2f5;
        }
        .upload-section .upload-tools .tools-left {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .upload-section .upload-tools .tools-left button {
            padding: 8px 16px;
            border: none;
            border-radius: 20px;
            background: #f0f2f5;
            color: #65676b;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .upload-section .upload-tools .tools-left button:hover {
            background: #e4e6eb;
        }
        .upload-section .upload-tools .tools-left .image-btn {
            color: #45b7d1;
        }
        .upload-section .upload-tools .tools-left .image-btn.has-image {
            background: #45b7d1;
            color: #fff;
        }
        .upload-section .upload-tools .publish-btn {
            padding: 8px 28px;
            border: none;
            border-radius: 20px;
            background: #1877f2;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        .upload-section .upload-tools .publish-btn:hover {
            background: #166fe5;
        }
        .upload-section .upload-tools .publish-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .upload-section .image-preview-container {
            display: none;
            margin-top: 12px;
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #f0f2f5;
        }
        .upload-section .image-preview-container.visible {
            display: block;
        }
        .upload-section .image-preview-container img {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            background: #fff;
        }
        .upload-section .image-preview-container .remove-image {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0, 0, 0, 0.6);
            border: none;
            color: #fff;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .upload-section .image-preview-container .remove-image:hover {
            background: rgba(255, 0, 0, 0.7);
        }

        /* ===== بطاقة المنشور ===== */
        .post-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            margin-bottom: 20px;
        }
        .post-header {
            padding: 12px 16px 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #f0f2f5;
        }
        .post-user {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .post-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .post-username {
            font-weight: 600;
            font-size: 14px;
            color: #1a1a1a;
        }
        .post-time {
            font-size: 12px;
            color: #65676b;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .post-content {
            padding: 12px 16px 8px;
        }
        .post-text {
            font-size: 15px;
            color: #1a1a1a;
            line-height: 1.7;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
        .post-image-wrapper {
            background: #f0f2f5;
            display: none;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: pointer;
        }
        .post-image-wrapper.visible {
            display: flex;
        }
        .post-image-wrapper img {
            width: 100%;
            height: auto;
            max-height: 500px;
            object-fit: contain;
            display: block;
            background: #fff;
        }
        .post-actions {
            display: flex;
            justify-content: space-around;
            padding: 6px 16px;
            border-top: 1px solid #f0f2f5;
            border-bottom: 1px solid #f0f2f5;
        }
        .post-actions button {
            flex: 1;
            padding: 8px 6px;
            border: none;
            border-radius: 6px;
            background: transparent;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #65676b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .post-actions button:hover {
            background: #f0f2f5;
        }
        .post-actions button.liked {
            color: #1877f2;
        }
        .post-actions button.liked i {
            font-weight: 900;
        }

        /* ===== التعليقات ===== */
        .comments-section {
            padding: 10px 16px 14px;
            background: #fafafa;
            border-top: 1px solid #f0f2f5;
            display: none;
        }
        .comments-section.visible {
            display: block;
        }
        .comments-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .comments-header h4 {
            font-size: 13px;
            color: #65676b;
            font-weight: 500;
        }
        .comments-header .comment-count {
            background: #e4e6eb;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            color: #65676b;
        }
        .comments-list {
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 10px;
        }
        .comment-item {
            display: flex;
            gap: 8px;
            padding: 6px 0;
            border-bottom: 1px solid #f0f2f5;
        }
        .comment-item:last-child {
            border-bottom: none;
        }
        .comment-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            font-weight: 600;
            flex-shrink: 0;
        }
        .comment-body {
            flex: 1;
        }
        .comment-user {
            font-weight: 600;
            font-size: 12px;
            color: #1a1a1a;
        }
        .comment-text {
            font-size: 13px;
            color: #1a1a1a;
            word-wrap: break-word;
        }
        .comment-time {
            font-size: 10px;
            color: #65676b;
            margin-top: 2px;
        }
        .no-comments {
            text-align: center;
            color: #65676b;
            font-size: 13px;
            padding: 15px 0;
        }
        .add-comment {
            display: flex;
            gap: 8px;
            align-items: center;
            padding-top: 8px;
            border-top: 1px solid #f0f2f5;
        }
        .add-comment input {
            flex: 1;
            padding: 8px 14px;
            border: 1px solid #e4e6eb;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
            background: #f0f2f5;
        }
        .add-comment input:focus {
            border-color: #1877f2;
            background: #fff;
        }
        .add-comment .send-btn {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            background: #1877f2;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .add-comment .send-btn:hover {
            background: #166fe5;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        }
        .empty-state i {
            font-size: 80px;
            color: #ccd0d5;
            margin-bottom: 16px;
        }
        .empty-state h3 {
            color: #65676b;
            font-weight: 500;
            margin-bottom: 8px;
        }
        .empty-state p {
            color: #8a8f94;
            font-size: 14px;
        }

        /* ===== Lightbox ===== */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .lightbox.active {
            display: flex;
        }
        .lightbox img {
            max-width: 90%;
            max-height: 85%;
            object-fit: contain;
            border-radius: 8px;
        }
        .lightbox .close-lightbox {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
            padding: 10px 16px;
            border-radius: 50%;
        }
        .lightbox .close-lightbox:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        .lightbox .lightbox-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 20px;
            border-radius: 20px;
        }

        /* ===== نافذة التأكيد ===== */
        .custom-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        .custom-modal.active {
            display: flex;
        }
        .custom-modal .modal-content {
            background: #fff;
            border-radius: 16px;
            padding: 30px 35px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .custom-modal .modal-content .modal-icon {
            font-size: 48px;
            margin-bottom: 12px;
            color: #ff6b6b;
        }
        .custom-modal .modal-content h3 {
            font-size: 20px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .custom-modal .modal-content p {
            font-size: 15px;
            color: #65676b;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .custom-modal .modal-content .modal-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .custom-modal .modal-content .modal-buttons button {
            padding: 10px 28px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .custom-modal .modal-content .modal-buttons .confirm-btn {
            background: #ff4d4d;
            color: #fff;
        }
        .custom-modal .modal-content .modal-buttons .confirm-btn:hover {
            background: #e04444;
        }
        .custom-modal .modal-content .modal-buttons .cancel-btn {
            background: #f0f2f5;
            color: #65676b;
        }
        .custom-modal .modal-content .modal-buttons .cancel-btn:hover {
            background: #e4e6eb;
        }

        /* ===== رسائل الإشعار ===== */
        #toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 14px 28px;
            border-radius: 50px;
            font-size: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
            max-width: 90%;
            text-align: center;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .login-box {
                padding: 30px 20px;
            }
            .page-header h1 {
                font-size: 18px;
            }
            .upload-section {
                padding: 12px 14px;
            }
            .upload-section .upload-textarea {
                font-size: 13px;
                min-height: 50px;
            }
            .post-image-wrapper img {
                max-height: 300px;
            }
        }
    </style>
</head>

<body>
    <!-- ===== نافذة تسجيل الدخول ===== -->
    <div class="login-overlay active" id="loginOverlay">
        <div class="login-box">
            <div class="login-icon"><i class="fa-regular fa-user"></i></div>
            <h2>مرحباً بك! 👋</h2>
            <p>أدخل اسمك للمشاركة في معرض الصور</p>
            <input type="text" id="loginNameInput" placeholder="أدخل اسمك..." maxlength="30" />
            <div class="login-error" id="loginError">⚠️ الرجاء إدخال اسم صحيح</div>
            <button class="login-btn" id="loginBtn"><i class="fa-regular fa-arrow-right"></i> دخول</button>
        </div>
    </div>

    <div class="container">
        <!-- ===== رأس الصفحة ===== -->
        <div class="page-header">
            <div style="display:flex;align-items:center;gap:12px;">
                <button class="back-btn" id="backBtn" onclick="closeProfile()">
                    <i class="fa-solid fa-arrow-right"></i> رجوع
                </button>
                <h1><i class="fa-solid fa-images"></i> معرض الصور</h1>
            </div>
            <div class="user-info" id="userInfo" title="انقر لتغيير الاسم">
                <span class="user-name-display" id="userNameDisplay">مستخدم</span>
                <div class="avatar" id="userAvatar"><span id="avatarLetter">م</span></div>
            </div>
        </div>

        <!-- ===== قسم إضافة منشور ===== -->
        <div class="upload-section" id="uploadSection">
            <div class="upload-header">
                <div class="upload-avatar" id="uploadAvatar">م</div>
                <textarea class="upload-textarea" id="postTextInput" placeholder="ماذا تريد أن تنشر؟"></textarea>
            </div>
            <div class="image-preview-container" id="imagePreviewContainer">
                <img id="imagePreview" src="" alt="معاينة الصورة" />
                <button class="remove-image" onclick="removeImage()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="upload-tools">
                <div class="tools-left">
                    <button class="image-btn" onclick="document.getElementById('fileInput').click()">
                        <i class="fa-regular fa-image"></i>
                        <span id="imageBtnText">إضافة صورة</span>
                    </button>
                    <input type="file" id="fileInput" accept="image/*" hidden />
                </div>
                <button class="publish-btn" id="publishBtn" onclick="publishPost()">
                    <i class="fa-regular fa-paper-plane"></i> نشر
                </button>
            </div>
        </div>

        <!-- ===== حاوية المنشورات ===== -->
        <div id="postsContainer"></div>

        <!-- ===== حالة فارغة ===== -->
        <div class="empty-state" id="emptyState">
            <i class="fa-regular fa-images"></i>
            <h3>لا توجد منشورات</h3>
            <p>انشر أول منشور لمشاركته مع الآخرين</p>
        </div>
    </div>

    <!-- ===== Lightbox ===== -->
    <div class="lightbox" id="lightbox" onclick="closeLightbox()">
        <button class="close-lightbox" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></button>
        <img id="lightboxImage" src="" alt="صورة مكبرة" />
        <div class="lightbox-info" id="lightboxInfo"></div>
    </div>

    <!-- ===== نافذة التأكيد ===== -->
    <div class="custom-modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
            <h3 id="confirmTitle">تأكيد الحذف</h3>
            <p id="confirmMessage">هل أنت متأكد؟</p>
            <div class="modal-buttons">
                <button class="cancel-btn" onclick="closeConfirm()">إلغاء</button>
                <button class="confirm-btn" id="confirmYesBtn">تأكيد</button>
            </div>
        </div>
    </div>

    <!-- ===== رسالة إشعار ===== -->
    <div id="toast"></div>

    <script>
        // ============================================================
        // ===== مفتاح ImgBB =====
        // ============================================================
        const IMGBB_API_KEY = '1325c7cdc0aaa248f2175858733c3231';

        // ============================================================
        // ===== المتغيرات العامة =====
        // ============================================================
        let currentUserName = '';
        let currentUserId = '';
        let isAdmin = false;
        let allPosts = [];
        let tempImageData = null;
        let confirmCallback = null;

        // ============================================================
        // ===== تسجيل الدخول =====
        // ============================================================
        function loginUser(name) {
            name = name.trim();
            if (!name || name.length < 2) {
                document.getElementById('loginError').classList.add('show');
                return;
            }

            currentUserName = name;
            currentUserId = 'user_' + Date.now() + '_' + Math.random().toString(36).substring(2, 9);
            localStorage.setItem('userName', currentUserName);
            localStorage.setItem('userId', currentUserId);

            document.getElementById('loginOverlay').classList.remove('active');
            updateUI();
            showToast('👋 مرحباً ' + currentUserName + '!', 2500);
            loadPosts();
        }

        document.getElementById('loginBtn').onclick = () => {
            loginUser(document.getElementById('loginNameInput').value);
        };
        document.getElementById('loginNameInput').onkeydown = (e) => {
            if (e.key === 'Enter') {
                loginUser(document.getElementById('loginNameInput').value);
            }
            document.getElementById('loginError').classList.remove('show');
        };

        function checkLogin() {
            const savedName = localStorage.getItem('userName');
            const savedId = localStorage.getItem('userId');
            if (savedName && savedId) {
                currentUserName = savedName;
                currentUserId = savedId;
                document.getElementById('loginOverlay').classList.remove('active');
                updateUI();
                return true;
            }
            return false;
        }

        function updateUI() {
            const letter = currentUserName.charAt(0).toUpperCase();
            document.getElementById('userNameDisplay').textContent = currentUserName;
            document.getElementById('avatarLetter').textContent = letter;
            document.getElementById('uploadAvatar').textContent = letter;
        }

        // تغيير الاسم
        document.getElementById('userInfo').onclick = () => {
            const newName = prompt('✏️ أدخل اسمك الجديد:', currentUserName);
            if (newName && newName.trim() && newName.trim().length >= 2) {
                currentUserName = newName.trim();
                localStorage.setItem('userName', currentUserName);
                updateUI();
                showToast('✅ تم تغيير الاسم إلى ' + currentUserName, 2000);
            }
        };

        // ============================================================
        // ===== IndexedDB =====
        // ============================================================
        let db = null;

        function openDB() {
            return new Promise((resolve, reject) => {
                const request = indexedDB.open('GalleryDB_V8', 1);
                request.onupgradeneeded = (e) => {
                    const db = e.target.result;
                    if (!db.objectStoreNames.contains('posts')) {
                        db.createObjectStore('posts', { keyPath: 'id' });
                    }
                };
                request.onsuccess = (e) => {
                    db = e.target.result;
                    resolve(db);
                };
                request.onerror = (e) => reject(e.target.error);
            });
        }

        function savePost(post) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(['posts'], 'readwrite');
                const store = tx.objectStore('posts');
                store.put(post);
                tx.oncomplete = resolve;
                tx.onerror = (e) => reject(e.target.error);
            });
        }

        function deletePost(id) {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(['posts'], 'readwrite');
                const store = tx.objectStore('posts');
                store.delete(id);
                tx.oncomplete = resolve;
                tx.onerror = (e) => reject(e.target.error);
            });
        }

        function getAllPosts() {
            return new Promise((resolve, reject) => {
                const tx = db.transaction(['posts'], 'readonly');
                const store = tx.objectStore('posts');
                const request = store.getAll();
                request.onsuccess = () => {
                    const posts = request.result || [];
                    posts.sort((a, b) => b.timestamp - a.timestamp);
                    resolve(posts);
                };
                request.onerror = (e) => reject(e.target.error);
            });
        }

        // ============================================================
        // ===== ضغط الصورة =====
        // ============================================================
        function compressImage(file, maxWidth = 1200, maxHeight = 1200, quality = 0.8) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let w = img.width,
                            h = img.height;
                        if (w > maxWidth) { h = (h * maxWidth) / w;
                            w = maxWidth; }
                        if (h > maxHeight) { w = (w * maxHeight) / h;
                            h = maxHeight; }
                        const canvas = document.createElement('canvas');
                        canvas.width = w;
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', quality));
                    };
                    img.onerror = reject;
                    img.src = e.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        // ============================================================
        // ===== رفع الصورة للسحابة =====
        // ============================================================
        async function uploadToCloud(imageDataUrl) {
            try {
                const response = await fetch(imageDataUrl);
                const blob = await response.blob();
                const formData = new FormData();
                formData.append('image', blob, 'image.jpg');
                formData.append('key', IMGBB_API_KEY);

                const uploadRes = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });

                const result = await uploadRes.json();
                if (result.success) {
                    console.log('✅ رفع للسحابة:', result.data.url);
                    return result.data.url;
                } else {
                    throw new Error(result.error?.message || 'فشل الرفع');
                }
            } catch (error) {
                console.warn('⚠️ فشل الرفع للسحابة، سيتم الحفظ محلياً:', error.message);
                return imageDataUrl;
            }
        }

        // ============================================================
        // ===== وظائف مساعدة =====
        // ============================================================
        function getAvatarColor(id) {
            const colors = ['#4facfe', '#a18cd1', '#fbc2eb', '#f6d365', '#ff6b6b', '#4ecdc4', '#45b7d1', '#96c93d'];
            let hash = 0;
            for (let i = 0; i < id.length; i++) {
                hash = id.charCodeAt(i) + ((hash << 5) - hash);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        function getTime(timestamp) {
            const diff = Math.floor((Date.now() - timestamp) / 1000);
            if (diff < 60) return 'الآن';
            if (diff < 3600) return Math.floor(diff / 60) + ' دقيقة';
            if (diff < 86400) return Math.floor(diff / 3600) + ' ساعة';
            if (diff < 604800) return Math.floor(diff / 86400) + ' يوم';
            return new Date(timestamp).toLocaleDateString('ar-EG');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================================
        // ===== النشر =====
        // ============================================================

        // دالة النشر الرئيسية - مبسطة ومباشرة
        async function publishPost() {
            const text = document.getElementById('postTextInput').value.trim();
            const image = tempImageData;

            // التحقق من وجود نص أو صورة
            if (!text && !image) {
                showToast('⚠️ الرجاء كتابة نص أو إضافة صورة', 2500);
                return;
            }

            // تعطيل الزر
            const btn = document.getElementById('publishBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري النشر...';

            try {
                let imageUrl = null;

                // معالجة الصورة
                if (image) {
                    showToast('📤 جاري رفع الصورة...', 2000);
                    imageUrl = await uploadToCloud(image);
                    if (imageUrl && imageUrl !== image) {
                        showToast('✅ تم رفع الصورة للسحابة', 1500);
                    } else {
                        showToast('⚠️ تم حفظ الصورة محلياً', 1500);
                    }
                }

                // إنشاء المنشور
                const post = {
                    id: Date.now(),
                    text: text || '',
                    image: imageUrl || null,
                    userId: currentUserId,
                    userName: currentUserName,
                    timestamp: Date.now(),
                    likes: 0,
                    likedBy: [],
                    comments: []
                };

                // حفظ في قاعدة البيانات
                await savePost(post);
                showToast('✅ تم نشر المنشور بنجاح', 2000);

                // تنظيف المدخلات
                document.getElementById('postTextInput').value = '';
                removeImage();

                // إعادة تحميل المنشورات
                await loadPosts();

            } catch (error) {
                console.error('❌ خطأ في النشر:', error);
                showToast('⚠️ حدث خطأ أثناء النشر', 3000);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-regular fa-paper-plane"></i> نشر';
            }
        }

        // ============================================================
        // ===== تحميل وعرض المنشورات =====
        // ============================================================

        async function loadPosts() {
            try {
                allPosts = await getAllPosts();
                renderPosts(allPosts);
                console.log('✅ تم تحميل ' + allPosts.length + ' منشور');
            } catch (error) {
                console.error('❌ خطأ في تحميل المنشورات:', error);
            }
        }

        function renderPosts(posts) {
            const container = document.getElementById('postsContainer');
            const emptyState = document.getElementById('emptyState');

            if (!posts || posts.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = '';

            posts.forEach((post) => {
                const isLiked = post.likedBy && post.likedBy.includes(currentUserId);
                const userName = post.userName || 'مستخدم';
                const avatarColor = getAvatarColor(post.userId);
                const timeAgo = getTime(post.timestamp);

                // نص المنشور
                const hasText = post.text && post.text.trim() !== '';
                const textHTML = hasText ?
                    `<div class="post-text">${escapeHtml(post.text)}</div>` :
                    '';

                // صورة المنشور
                const hasImage = post.image && post.image !== null;
                const imageHTML = hasImage ?
                    `
                    <div class="post-image-wrapper visible" onclick="openLightbox('${post.image}', '${userName}', '${timeAgo}')">
                        <img src="${post.image}" alt="صورة" loading="lazy" />
                    </div>
                    ` :
                    '';

                // التعليقات
                let commentsHTML = '';
                if (post.comments && post.comments.length > 0) {
                    post.comments.forEach(comment => {
                        const cUser = comment.userName || 'مستخدم';
                        const cColor = getAvatarColor(comment.userId);
                        const cTime = getTime(comment.timestamp);
                        commentsHTML += `
                            <div class="comment-item">
                                <div class="comment-avatar" style="background:${cColor};">${cUser.charAt(0).toUpperCase()}</div>
                                <div class="comment-body">
                                    <div class="comment-user">${cUser}</div>
                                    <div class="comment-text">${escapeHtml(comment.text)}</div>
                                    <div class="comment-time">${cTime}</div>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    commentsHTML = `<div class="no-comments"><p>لا توجد تعليقات بعد</p></div>`;
                }

                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-header">
                        <div class="post-user" onclick="openProfile('${post.userId}')">
                            <div class="post-avatar" style="background:${avatarColor};">${userName.charAt(0).toUpperCase()}</div>
                            <div>
                                <div class="post-username">${userName}</div>
                                <div class="post-time"><i class="fa-regular fa-clock"></i> ${timeAgo}</div>
                            </div>
                        </div>
                        <div>
                            <button class="delete-btn" onclick="deletePost(${post.id})" style="background:none;border:none;cursor:pointer;color:#65676b;font-size:16px;">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                    <div class="post-content">${textHTML}</div>
                    ${imageHTML}
                    <div class="post-actions">
                        <button class="${isLiked ? 'liked' : ''}" onclick="toggleLike(${post.id})">
                            <i class="${isLiked ? 'fa-solid' : 'fa-regular'} fa-thumbs-up"></i>
                            <span>إعجاب</span>
                            ${post.likes > 0 ? `<span>(${post.likes})</span>` : ''}
                        </button>
                        <button onclick="toggleComments(${post.id})">
                            <i class="fa-regular fa-comment"></i>
                            <span>تعليق</span>
                            ${post.comments && post.comments.length > 0 ? `<span>(${post.comments.length})</span>` : ''}
                        </button>
                        <button onclick="sharePost('${post.image || ''}', '${escapeHtml(post.text || '').replace(/'/g, "\\'")}')">
                            <i class="fa-regular fa-share-from-square"></i>
                            <span>مشاركة</span>
                        </button>
                    </div>
                    <div class="comments-section" id="comments-${post.id}">
                        <div class="comments-header">
                            <h4>💬 التعليقات</h4>
                            <span class="comment-count">${post.comments ? post.comments.length : 0}</span>
                        </div>
                        <div class="comments-list">${commentsHTML}</div>
                        <div class="add-comment">
                            <input type="text" id="commentInput-${post.id}" placeholder="اكتب تعليقاً..." />
                            <button class="send-btn" onclick="addCommentHandler(${post.id})">
                                <i class="fa-regular fa-paper-plane"></i>
                            </button>
                        </div>
                    </div>
                `;

                container.appendChild(card);

                // حدث Enter للتعليق
                const input = card.querySelector(`#commentInput-${post.id}`);
                if (input) {
                    input.onkeydown = (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            addCommentHandler(post.id);
                        }
                    };
                }
            });
        }

        // ============================================================
        // ===== الإعجابات والتعليقات =====
        // ============================================================

        async function toggleLike(postId) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            const idx = post.likedBy.indexOf(currentUserId);
            if (idx === -1) {
                post.likedBy.push(currentUserId);
                post.likes++;
            } else {
                post.likedBy.splice(idx, 1);
                post.likes--;
            }

            await savePost(post);
            await loadPosts();
        }

        async function addCommentHandler(postId) {
            const input = document.getElementById(`commentInput-${postId}`);
            if (!input || !input.value.trim()) return;

            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            post.comments.push({
                id: Date.now(),
                userId: currentUserId,
                userName: currentUserName,
                text: input.value.trim(),
                timestamp: Date.now()
            });

            await savePost(post);
            input.value = '';
            await loadPosts();
            showToast('💬 تم إضافة تعليق', 1500);
        }

        function toggleComments(postId) {
            const section = document.getElementById(`comments-${postId}`);
            if (section) {
                section.style.display = section.style.display === 'none' || section.style.display === '' ? 'block' : 'none';
            }
        }

        // ============================================================
        // ===== حذف المنشور =====
        // ============================================================

        async function deletePost(postId) {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            const canDelete = post.userId === currentUserId || isAdmin;
            if (!canDelete) {
                showToast('⛔ لا يمكنك حذف منشور مستخدم آخر', 3000);
                return;
            }

            showConfirm('تأكيد الحذف', 'هل أنت متأكد من حذف هذا المنشور؟', async () => {
                await deletePost(postId);
                await loadPosts();
                showToast('🗑️ تم حذف المنشور');
            });
        }

        // ============================================================
        // ===== الملف الشخصي =====
        // ============================================================

        function openProfile(userId) {
            const userPosts = allPosts.filter(p => p.userId === userId);
            const userName = userId === currentUserId ? currentUserName : 'مستخدم ' + userId.substring(0, 6);
            showToast(`📝 ${userName} لديه ${userPosts.length} منشور`, 2500);
        }

        function closeProfile() {}

        // ============================================================
        // ===== Lightbox =====
        // ============================================================

        function openLightbox(src, userName, time) {
            document.getElementById('lightboxImage').src = src;
            document.getElementById('lightboxInfo').textContent = `${userName} · ${time}`;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        // ============================================================
        // ===== المشاركة =====
        // ============================================================

        function sharePost(imageSrc, text) {
            const shareText = text || '📸 شاهد هذا المنشور!';
            if (navigator.share) {
                navigator.share({ title: 'معرض الصور', text: shareText }).catch(() => {});
            } else {
                navigator.clipboard.writeText(shareText).then(() => {
                    showToast('📋 تم نسخ النص للحافظة');
                }).catch(() => {
                    showToast('📋 يمكنك مشاركة هذا المنشور يدوياً');
                });
            }
        }

        // ============================================================
        // ===== إدارة الصورة المؤقتة =====
        // ============================================================

        document.getElementById('fileInput').onchange = async function() {
            const file = this.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showToast('⚠️ الرجاء اختيار ملف صورة');
                this.value = '';
                return;
            }

            try {
                const compressed = await compressImage(file);
                tempImageData = compressed;
                document.getElementById('imagePreview').src = compressed;
                document.getElementById('imagePreviewContainer').classList.add('visible');
                document.querySelector('.image-btn').classList.add('has-image');
                document.getElementById('imageBtnText').textContent = 'تغيير الصورة';
                showToast('✅ تم إضافة الصورة', 1500);
            } catch (error) {
                showToast('⚠️ حدث خطأ في معالجة الصورة', 3000);
            }
            this.value = '';
        };

        function removeImage() {
            tempImageData = null;
            document.getElementById('imagePreview').src = '';
            document.getElementById('imagePreviewContainer').classList.remove('visible');
            document.querySelector('.image-btn').classList.remove('has-image');
            document.getElementById('imageBtnText').textContent = 'إضافة صورة';
        }

        // ============================================================
        // ===== نافذة التأكيد =====
        // ============================================================

        function showConfirm(title, message, onConfirm) {
            document.getElementById('confirmTitle').textContent = title;
            document.getElementById('confirmMessage').textContent = message;
            document.getElementById('confirmModal').classList.add('active');
            confirmCallback = onConfirm;
        }

        function closeConfirm() {
            document.getElementById('confirmModal').classList.remove('active');
            confirmCallback = null;
        }

        document.getElementById('confirmYesBtn').onclick = () => {
            if (confirmCallback) confirmCallback();
            closeConfirm();
        };

        // ============================================================
        // ===== رسائل الإشعار =====
        // ============================================================

        function showToast(message, duration = 2500) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), duration);
        }

        // ============================================================
        // ===== اختصارات =====
        // ============================================================

        document.getElementById('postTextInput').onkeydown = (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                publishPost();
            }
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeLightbox();
                closeConfirm();
            }
        });

        // ============================================================
        // ===== تهيئة التطبيق =====
        // ============================================================

        async function initApp() {
            // تسجيل الدخول
            if (!checkLogin()) {
                document.getElementById('loginOverlay').classList.add('active');
                document.getElementById('loginNameInput').focus();
                return;
            }

            try {
                await openDB();
                await loadPosts();
                showToast(`👋 مرحباً ${currentUserName}!`, 2000);
            } catch (error) {
                console.error('❌ خطأ:', error);
                showToast('⚠️ حدث خطأ في تهيئة التطبيق', 3000);
            }
        }

        // بدء التطبيق
        initApp();
    </script>
</body>
</html>
