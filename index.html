 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام الكروت</title>

<style>
body{
  font-family: Arial;
  text-align:center;
  margin-top:60px;
  background:#f5f5f5;
}

.box{
  background:white;
  padding:20px;
  margin:auto;
  width:320px;
  border-radius:10px;
  box-shadow:0 0 10px #ccc;
}

input{
  padding:10px;
  width:90%;
  margin:5px 0;
}

button{
  padding:10px;
  width:95%;
  cursor:pointer;
  margin-top:10px;
}

#adminPanel{
  display:none;
  margin-top:20px;
}
</style>
</head>
<body>

<div class="box">

<h2>تفعيل الكرت</h2>

<input type="text" id="cardCode" placeholder="أدخل رقم الكرت">
<button onclick="checkCard()">دخول</button>

<p id="msg"></p>

<hr>

<h4>لوحة الأدمن</h4>

<input type="password" id="adminPass" placeholder="كلمة المرور">
<button onclick="openAdmin()">دخول الأدمن</button>

<div id="adminPanel">

  <h3>توليد الكروت</h3>
  <input type="number" id="count" placeholder="عدد الكروت">
  <button onclick="generateCards()">توليد الكروت</button>

  <button onclick="exportCSV()">تصدير أرقام الكروت CSV</button>

  <p id="adminMsg"></p>

</div>

</div>

<script>
const SUPABASE_URL = "https://eorcwpnppumcppbmylt.supabase.co";

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVvcmN3cG9ucHB1bWNwcGJteWx0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NDYzMzgsImV4cCI6MjA5MjAyMjMzOH0.TWIDhL_WONrQ1YyxBTFW3Xw4QJn_DlaKwHsrmyEuq98";

const ADMIN_PASSWORD = "1234";

// ================= الجهاز =================
function getDeviceId(){
  let id = localStorage.getItem("device_id");
  if(!id){
    id = Math.random().toString(36).substring(2);
    localStorage.setItem("device_id", id);
  }
  return id;
}

// ================= التحقق من الكرت =================
async function checkCard(){
  const code = document.getElementById("cardCode").value.trim();
  const msg = document.getElementById("msg");
  const deviceId = getDeviceId();

  if(!code){
    msg.innerText = "أدخل رقم الكرت";
    return;
  }

  const res = await fetch(`${SUPABASE_URL}/rest/v1/cards?code=eq.${code}`,{
    headers:{
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  if(data.length === 0){
    msg.innerText = "الكرت غير موجود";
    return;
  }

  const card = data[0];

  if(!card.activated){
    await fetch(`${SUPABASE_URL}/rest/v1/cards?id=eq.${card.id}`,{
      method:"PATCH",
      headers:{
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        activated:true,
        device_id:deviceId
      })
    });

    window.location.href = "result.html";
    return;
  }

  if(card.device_id === deviceId){
    window.location.href = "result.html";
  }else{
    msg.innerText = "الكرت مستخدم على جهاز آخر";
  }
}

// ================= الأدمن =================
function openAdmin(){
  const pass = document.getElementById("adminPass").value;

  if(pass === ADMIN_PASSWORD){
    document.getElementById("adminPanel").style.display = "block";
  }else{
    alert("كلمة المرور خطأ");
  }
}

// ================= توليد الكروت =================
function randomCode(){
  return Math.floor(100000 + Math.random()*900000).toString();
}

async function generateCards(){
  const count = document.getElementById("count").value;
  const msg = document.getElementById("adminMsg");

  if(!count){
    msg.innerText = "أدخل عدد الكروت";
    return;
  }

  let cards = [];

  for(let i=0;i<count;i++){
    cards.push({
      code: randomCode(),
      activated:false,
      device_id:null
    });
  }

  const res = await fetch(`${SUPABASE_URL}/rest/v1/cards`,{
    method:"POST",
    headers:{
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      "Content-Type":"application/json",
      Prefer:"return=representation"
    },
    body:JSON.stringify(cards)
  });

  if(res.ok){
    msg.innerText = "تم إنشاء الكروت بنجاح 🎉";
  }else{
    msg.innerText = "حدث خطأ";
  }
}

// ================= تصدير CSV (أرقام فقط) =================
async function exportCSV(){
  const msg = document.getElementById("adminMsg");

  const res = await fetch(`${SUPABASE_URL}/rest/v1/cards?select=code`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await res.json();

  if(!data || data.length === 0){
    msg.innerText = "لا توجد كروت للتصدير";
    return;
  }

  let csv = "code\n";

  data.forEach(row => {
    csv += `${row.code}\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "cards_codes.csv";
  a.click();

  URL.revokeObjectURL(url);

  msg.innerText = "تم تصدير أرقام الكروت 📁";
}
</script>

</body>
</html>
