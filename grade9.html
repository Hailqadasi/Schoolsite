function getClass(score){
    return score >= 20 ? 'pass':'fail'; // اعتبر النجاح >=20 لكل مادة
}

function search() {
    const seat = parseInt(document.getElementById('seat').value);
    const resultDiv = document.getElementById('result');
    const student = students.find(s => s.seat === seat);
    if(student){
        resultDiv.innerHTML = `
        <div class="card">
            <div class="card-header">${student.name} - رقم الجلوس: ${student.seat}</div>
            <div class="grid">
                <div class="item ${getClass(student.q)}">القرآن: ${student.q}</div>
                <div class="item ${getClass(student.i)}">الإسلامية: ${student.i}</div>
                <div class="item ${getClass(student.a)}">العربي: ${student.a}</div>
                <div class="item ${getClass(student.e)}">الإنجليزي: ${student.e}</div>
                <div class="item ${getClass(student.m)}">الرياضيات: ${student.m}</div>
                <div class="item ${getClass(student.p)}">العلوم: ${student.p}</div>
                <div class="item ${getClass(student.soc)}">الاجتماعيات: ${student.soc}</div>
            </div>
            <div class="total">المجموع الكلي: ${student.t}</div>
        </div>
        `;
    } else {
        resultDiv.innerHTML = `<div class="error">لا توجد نتيجة لهذا الرقم</div>`;
    }
