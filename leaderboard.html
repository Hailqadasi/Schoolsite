 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>لوحة الصدارة</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: tahoma;
  background: linear-gradient(to bottom, #0b3d91, #1e90ff);
  color: white;
  text-align: center;
}

h2 {
  margin-top: 20px;
}

table {
  width: 95%;
  margin: 20px auto;
  background: white;
  color: black;
  border-radius: 10px;
  overflow: hidden;
}

th {
  background: #0b3d91;
  color: white;
}

td, th {
  padding: 10px;
  text-align: center;
}
</style>
</head>

<body>

<h2>🏆 كشف الطلاب حسب الدرجة</h2>

<table border="1">
<thead>
<tr>
<th>الترتيب</th>
<th>اسم الطالب</th>
<th>الدرجة</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

<script>
// 🔹 إعداد Firebase (نفس البيانات)
var firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT"
};
firebase.initializeApp(firebaseConfig);

// 🔹 جلب البيانات
var ref = firebase.database().ref("students");

ref.on("value", function(snapshot) {

  var list = [];

  snapshot.forEach(function(child) {
    list.push(child.val());
  });

  // 🔹 ترتيب حسب الأعلى
  list.sort(function(a, b) {
    return b.score - a.score;
  });

  // 🔹 عرض البيانات
  var html = "";

  for (var i = 0; i < list.length; i++) {
    html += "<tr>";
    html += "<td>" + (i + 1) + "</td>";
    html += "<td>" + list[i].name + "</td>";
    html += "<td>" + list[i].score + "</td>";
    html += "</tr>";
  }

  document.getElementById("data").innerHTML = html;

});
</script>

</body>
</html>
