 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الصدارة</title>

<style>
body{
    font-family:tahoma;
    background:linear-gradient(to bottom,#0b3d91,#1e50a2);
    text-align:center;
    color:white;
    padding:20px;
}

.box{
    background:white;
    color:black;
    max-width:500px;
    margin:auto;
    padding:20px;
    border-radius:15px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    border-bottom:1px solid #ccc;
}

th{
    background:#0b3d91;
    color:white;
}

.rank1{background:gold;}
.rank2{background:silver;}
.rank3{background:#cd7f32;}

button{
    margin-top:10px;
    padding:10px 20px;
    font-size:16px;
    background:#0b3d91;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.reset{background:#dc3545;}
</style>
</head>

<body>

<h1>🏆 لوحة الصدارة</h1>

<div class="box">

<!-- إدخال بيانات اللاعب -->
<input type="text" id="phone" placeholder="رقم الهاتف"><br><br>
<input type="number" id="score" placeholder="النقاط"><br>

<button onclick="addScore()">إضافة النقاط</button>

<table>
<thead>
<tr>
<th>المركز</th>
<th>رقم الهاتف</th>
<th>النقاط</th>
</tr>
</thead>

<tbody id="leaderboardBody"></tbody>
</table>

<button onclick="goHome()">العودة للرئيسية</button><br>
<button class="reset" onclick="resetLeaderboard()">تصفير لوحة الصدارة</button>

</div>

<script>

// جلب البيانات
let leaderboard = JSON.parse(localStorage.getItem("leaderboard")) || [];

// عرض البيانات
function displayLeaderboard(){

let tbody = document.getElementById("leaderboardBody");
tbody.innerHTML = "";

// ترتيب
leaderboard.sort((a,b)=> b.score - a.score);

leaderboard.forEach((player,index)=>{

let row = document.createElement("tr");

if(index === 0) row.classList.add("rank1");
if(index === 1) row.classList.add("rank2");
if(index === 2) row.classList.add("rank3");

row.innerHTML = `
<td>${index+1}</td>
<td>${player.phone}</td>
<td>${player.score}</td>
`;

tbody.appendChild(row);

});

}

// حفظ أو تحديث النقاط
function saveScore(phone, newScore){

let playerIndex = leaderboard.findIndex(p => p.phone === phone);

if(playerIndex !== -1){
// تحديث
leaderboard[playerIndex].score += newScore;
}else{
// جديد
leaderboard.push({
phone: phone,
score: newScore
});
}

// حفظ
localStorage.setItem("leaderboard", JSON.stringify(leaderboard));

displayLeaderboard();

}

// زر إضافة النقاط
function addScore(){

let phone = document.getElementById("phone").value;
let score = parseInt(document.getElementById("score").value);

if(!phone || isNaN(score)){
alert("أدخل البيانات بشكل صحيح");
return;
}

saveScore(phone, score);

document.getElementById("phone").value = "";
document.getElementById("score").value = "";

}

// العودة
function goHome(){
window.location.href = "index.html";
}

// تصفير
function resetLeaderboard(){

let confirmReset = confirm("هل تريد تصفير لوحة الصدارة؟");

if(confirmReset){
localStorage.removeItem("leaderboard");
leaderboard = [];
displayLeaderboard();
}

}

// تشغيل أولي
displayLeaderboard();

</script>

</body>
</html>
