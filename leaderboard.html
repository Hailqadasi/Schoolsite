<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النتائج</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  font-family: tahoma;
  background: linear-gradient(to bottom, #fff, #ffe4ec);
  text-align: center;
}

h2 {
  color: #d63384;
}

table {
  width: 95%;
  margin: 20px auto;
  background: white;
  border-radius: 15px;
  overflow: hidden;
}

th {
  background: #ff85a2;
  color: white;
}

td, th {
  padding: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<h2>🏆 النتائج</h2>

<div id="content">
<table border="1">
<thead>
<tr>
<th>الترتيب</th>
<th>الاسم</th>
<th>الدرجة</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<script>
var firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT"
};
firebase.initializeApp(firebaseConfig);

// إخفاء النتائج
firebase.database().ref("settings/results").on("value", function(snap){
  if (snap.val() === "hide") {
    document.getElementById("content").innerHTML = "<h3>🚫 النتائج مخفية</h3>";
  }
});

// عرض البيانات
firebase.database().ref("students").on("value", function(snapshot){
  var list = [];
  snapshot.forEach(function(c){ list.push(c.val()); });

  list.sort(function(a,b){ return b.score - a.score; });

  var html = "";
  for (var i=0;i<list.length;i++){
    html += "<tr><td>"+(i+1)+"</td><td>"+list[i].name+"</td><td>"+list[i].score+"</td></tr>";
  }

  document.getElementById("data").innerHTML = html;
});
</script>

</body>
</html>
