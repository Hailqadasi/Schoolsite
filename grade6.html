<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نتيجة الطالب</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  min-height:100vh;
  padding:20px;
  color:#fff;
  margin:0;
}
.card{
  background:#ffffff;
  color:#000;
  max-width:520px;
  margin:auto;
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,.3);
}
h2{
  text-align:center;
  color:#203a43;
  margin-bottom:25px;
  font-size:1.8em;
}
input,button{
  width:100%;
  padding:12px 15px;
  margin:10px 0;
  font-size:16px;
  border-radius:8px;
  box-sizing:border-box;
}
input{
  border:2px solid #ddd;
  transition:border 0.3s;
}
input:focus{
  border-color:#2c5364;
  outline:none;
}
button{
  background:#2c5364;
  color:#fff;
  border:none;
  cursor:pointer;
  transition:background 0.3s, transform 0.1s;
}
button:hover{
  background:#203a43;
}
button:active{
  transform:scale(0.98);
}
.result{
  margin-top:20px;
  padding:20px;
  border-radius:12px;
  background:#f7f7f7;
  border:1px solid #eee;
  display:none;
}
.pass{
  color:green;
  font-weight:bold;
  font-size:1.1em;
}
.fail{
  color:red;
  font-weight:bold;
  font-size:1.1em;
}
.row{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #ddd;
  padding:8px 0;
  font-size:1.05em;
}
.subject-name{
  color:#333;
}
.subject-score{
  color:#2c5364;
  font-weight:bold;
}
.subject-fail{
  color:red;
  font-weight:bold;
}
hr{
  border:none;
  border-top:2px solid #ddd;
  margin:15px 0;
}
.total{
  font-size:1.2em;
  color:#203a43;
  font-weight:bold;
}
.error{
  background:#ffe6e6;
  color:#d63031;
  padding:15px;
  border-radius:8px;
  text-align:center;
  border:1px solid #ffcccc;
}
.failed-subjects{
  background:#fff5f5;
  padding:10px;
  border-radius:8px;
  margin:10px 0;
  border:1px solid #ffcccc;
}
.failed-subjects ul{
  margin:5px 0;
  padding-right:15px;
}
.failed-subjects li{
  color:#d63031;
  margin:3px 0;
}
</style>
</head>

function showResult(){
  const seat=Number(document.getElementById("seat").value);
  const out=document.getElementById("output");
  
  if(!seat || seat < 220 || seat > 328){
    out.innerHTML="<div class='error'>يرجى إدخال رقم جلوس صحيح بين 220 و 328</div>";
    return;
  }
  
  const s=students.find(x=>x.seat===seat);

  if(!s){
    out.innerHTML="<div class='error'>رقم الجلوس غير موجود</div>";
    return;
  }

  // التحقق من الرسوب في أي مادة (أقل من 25)
  const failedSubjects = [];
  if(s.q < 25) failedSubjects.push({name: "قرآن", score: s.q});
  if(s.i < 25) failedSubjects.push({name: "إسلامية", score: s.i});
  if(s.a < 25) failedSubjects.push({name: "لغة عربية", score: s.a});
  if(s.e < 25) failedSubjects.push({name: "اجتماعيات", score: s.e});
  if(s.m < 25) failedSubjects.push({name: "رياضيات", score: s.m});
  if(s.s < 25) failedSubjects.push({name: "علوم", score: s.s});
  
  const hasFailed = failedSubjects.length > 0;

  // إنشاء HTML للمواد الفاشلة
  let failedSubjectsHTML = '';
  if(hasFailed){
    failedSubjectsHTML = `
    <div class="failed-subjects">
      <p><strong>المواد الراسب فيها (أقل من 25):</strong></p>
      <ul>
        ${failedSubjects.map(sub => `<li>${sub.name}: ${sub.score}</li>`).join('')}
      </ul>
    </div>`;
  }

  out.innerHTML=`
  <div class="result" style="display:block">
    <p><strong>الاسم:</strong> ${s.name}</p>
    <div class="row">
      <span class="subject-name">قرآن</span>
      <span class="${s.q < 25 ? 'subject-fail' : 'subject-score'}">${s.q} ${s.q < 25 ? '❌' : ''}</span>
    </div>
    <div class="row">
      <span class="subject-name">إسلامية</span>
      <span class="${s.i < 25 ? 'subject-fail' : 'subject-score'}">${s.i} ${s.i < 25 ? '❌' : ''}</span>
    </div>
    <div class="row">
      <span class="subject-name">لغة عربية</span>
      <span class="${s.a < 25 ? 'subject-fail' : 'subject-score'}">${s.a} ${s.a < 25 ? '❌' : ''}</span>
    </div>
    <div class="row">
      <span class="subject-name">رياضيات</span>
      <span class="${s.m < 25 ? 'subject-fail' : 'subject-score'}">${s.m} ${s.m < 25 ? '❌' : ''}</span>
    </div>
    <div class="row">
      <span class="subject-name">علوم</span>
      <span class="${s.s < 25 ? 'subject-fail' : 'subject-score'}">${s.s} ${s.s < 25 ? '❌' : ''}</span>
    </div>
    <div class="row">
      <span class="subject-name">اجتماعيات</span>
      <span class="${s.e < 25 ? 'subject-fail' : 'subject-score'}">${s.e} ${s.e < 25 ? '❌' : ''}</span>
    </div>
    <hr>
    ${failedSubjectsHTML}
    <p class="total">المجموع: ${s.t}</p>
    <p class="${hasFailed ? 'fail' : 'pass'}">
      ${hasFailed ? 'راسب ❌ (حصل على أقل من 25 في مادة أو أكثر)' : 'ناجح ✅'}
    </p>
  </div>`;
}

// إضافة إمكانية البحث عند الضغط على Enter
document.getElementById("seat").addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    event.preventDefault();
    showResult();
  }
});
</script>

</body>
</html>
