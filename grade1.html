 <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نتائج الطلاب</title>

<style>
body{
    font-family: Tahoma, Arial;
    background:#f2f4f8;
    margin:0;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
}

h1{
    text-align:center;
    color:#333;
}

.search-box{
    margin:20px 0;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
}

.card{
    background:#fff;
    border-radius:15px;
    padding:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
    margin-top:20px;
}

.row{
    display:flex;
    justify-content:space-between;
    padding:6px 0;
    border-bottom:1px dashed #eee;
}

.row:last-child{
    border:none;
}

.pass{
    color:green;
    font-weight:bold;
}

.fail{
    color:red;
    font-weight:bold;
}

.status{
    text-align:center;
    font-size:20px;
    margin-top:15px;
    padding:10px;
    border-radius:10px;
}

.status.pass{
    background:#e7f8ec;
}

.status.fail{
    background:#fdeaea;
}

/* مؤقت */
#timer{
    position:fixed;
    top:15px;
    left:15px;
    background:#ff3b30;
    color:white;
    padding:10px 18px;
    border-radius:12px;
    font-size:20px;
    font-weight:bold;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    z-index:999;
}
</style>
</head>

<body>

<!-- العداد -->
<div id="timer">05:00</div>

<div class="container">

<h1>نتائج الصف الأول أساسي</h1>

<div class="search-box">
<input type="text" id="search" placeholder="اكتب اسم الطالب كامل">
</div>

<div id="result"></div>

</div>

<script>

const PASS_MARK = 25;

/* بيانات الطلاب */
const students = [
{
name:"احمد امين محمد احمد",
grade:"الأول أساسي",
marks:{quran:45,islamic:45,arabic:38,math:48,science:45},
total:218
},
{
name:"احمد شوقي محمد حزام",
grade:"الأول أساسي",
marks:{quran:34,islamic:34,arabic:26,math:30,science:37},
total:169
}
];

/* دالة النجاح */
function isPass(m){
    return m >= PASS_MARK;
}

/* البحث */
document.getElementById("search").addEventListener("input", function(){

    const value = this.value.trim();
    const result = document.getElementById("result");

    result.innerHTML = "";

    if(!value) return;

    const student = students.find(s => s.name.includes(value));

    if(!student){

        result.innerHTML =
        "<p style='text-align:center;color:red'>لا يوجد طالب بهذا الاسم</p>";

        return;
    }

    let failed =
    Object.values(student.marks).some(m => m < PASS_MARK);

    let statusClass = failed ? "fail" : "pass";
    let statusText = failed ? "راسب" : "ناجح";

    result.innerHTML = `

    <div class="card">

        <div class="row">
            <strong>الاسم</strong>
            <span>${student.name}</span>
        </div>

        <div class="row">
            <strong>الصف</strong>
            <span>${student.grade}</span>
        </div>

        <div class="row">
            <strong>القرآن</strong>
            <span class="${isPass(student.marks.quran)?'pass':'fail'}">
            ${student.marks.quran}
            </span>
        </div>

        <div class="row">
            <strong>الإسلامية</strong>
            <span class="${isPass(student.marks.islamic)?'pass':'fail'}">
            ${student.marks.islamic}
            </span>
        </div>

        <div class="row">
            <strong>العربية</strong>
            <span class="${isPass(student.marks.arabic)?'pass':'fail'}">
            ${student.marks.arabic}
            </span>
        </div>

        <div class="row">
            <strong>الرياضيات</strong>
            <span class="${isPass(student.marks.math)?'pass':'fail'}">
            ${student.marks.math}
            </span>
        </div>

        <div class="row">
            <strong>العلوم</strong>
            <span class="${isPass(student.marks.science)?'pass':'fail'}">
            ${student.marks.science}
            </span>
        </div>

        <div class="row">
            <strong>المجموع الكلي</strong>
            <span>${student.total}</span>
        </div>

        <div class="status ${statusClass}">
            ${statusText}
        </div>

    </div>

    `;
});

/* مؤقت 5 دقائق */

let seconds = 300;

const timer = document.getElementById("timer");

function updateTimer(){

    let minutes = Math.floor(seconds / 60);
    let secs = seconds % 60;

    minutes = String(minutes).padStart(2,'0');
    secs = String(secs).padStart(2,'0');

    timer.innerText = `${minutes}:${secs}`;

    if(seconds <= 0){

        alert("انتهت مدة الجلسة");

        window.location.href = "index.html";
    }

    seconds--;
}

updateTimer();

setInterval(updateTimer,1000);

</script>

</body>
</html>
